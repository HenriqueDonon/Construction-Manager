<style>
:root{
  --bg:#0B0E13; --surface:#13181F; --surface2:#1A212A; --surface3:#232C36;
  --border:#262E39; --border2:#37434F;
  --text:#EAEEF4; --muted:#8B97A6; --faint:#586472;
  --accent:#FFB02E; --accent-d:#E0941A; --accent-soft:rgba(255,176,46,.12);
  --blue:#56A8E6; --blueprint:#15334C;
  --ok:#2FCD8E; --okbg:#0F3328; --danger:#FF5D62; --dangerbg:#371A1C; --warn:#FFB02E; --warnbg:#382B11;
  --shadow:0 18px 50px -12px rgba(0,0,0,.6); --shadow-s:0 4px 14px rgba(0,0,0,.34);
  --glow:0 0 0 1px rgba(255,176,46,.25),0 8px 30px -6px rgba(255,176,46,.25);
  --rad:16px; --rad-s:11px; --rad-xs:8px;
  --display:'Archivo',sans-serif; --body:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
  --grid-line:rgba(86,168,230,.045);
}
[data-theme="light"]{
  --bg:#EBEEF3; --surface:#FFFFFF; --surface2:#F4F7FA; --surface3:#E9EEF4;
  --border:#E1E7EF; --border2:#CDD7E2;
  --text:#141B26; --muted:#5A6678; --faint:#94A0AF;
  --accent:#E59100; --accent-d:#C97D00; --accent-soft:rgba(229,145,0,.12);
  --blue:#2E7FC4; --blueprint:#DCEAF6;
  --okbg:#E2F6EE; --dangerbg:#FCE7E7; --warnbg:#FDF3DC;
  --shadow:0 18px 50px -16px rgba(40,55,80,.22); --shadow-s:0 4px 14px rgba(40,55,80,.09);
  --glow:0 0 0 1px rgba(229,145,0,.28),0 8px 26px -8px rgba(229,145,0,.3);
  --grid-line:rgba(46,127,196,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
h1,h2,h3,h4{font-family:var(--display);font-weight:800;letter-spacing:-.025em;line-height:1.12}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--body);font-size:14px}
a{color:var(--blue);text-decoration:none}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
::selection{background:var(--accent-soft);color:var(--text)}

/* ---------- AUTH ---------- */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;
  background:
    radial-gradient(1100px 620px at 78% -12%, rgba(255,176,46,.14), transparent 60%),
    radial-gradient(900px 600px at 12% 110%, rgba(86,168,230,.10), transparent 55%),
    linear-gradient(180deg,color-mix(in srgb,var(--bg) 92%,#000),var(--bg));}
.auth-wrap::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:42px 42px;mask-image:radial-gradient(circle at 50% 40%,#000 30%,transparent 78%);pointer-events:none}
.auth-card{width:100%;max-width:430px;position:relative;background:linear-gradient(165deg,color-mix(in srgb,var(--surface) 96%,#fff 4%),var(--surface));
  border:1px solid var(--border2);border-radius:22px;padding:42px 38px;box-shadow:var(--shadow);
  animation:rise .6s cubic-bezier(.16,.84,.3,1)}
.auth-card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
@keyframes rise{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:8px}
.brand .logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(140deg,var(--accent),var(--accent-d));
  display:grid;place-items:center;color:#1A1206;font-weight:900;font-family:var(--display);font-size:23px;
  box-shadow:0 6px 18px -4px rgba(255,176,46,.5),inset 0 1px 0 rgba(255,255,255,.4)}
.brand .name{font-family:var(--display);font-weight:900;font-size:24px;letter-spacing:-.04em}
.brand .name span{color:var(--accent)}
.auth-sub{color:var(--muted);font-size:13.5px;margin:16px 0 28px;line-height:1.6}
.field{margin-bottom:17px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rad-s);
  padding:12px 14px;color:var(--text);transition:border-color .16s,box-shadow .16s,background .16s;outline:none}
.input::placeholder{color:var(--faint)}
.input:hover{border-color:var(--border2)}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3.5px var(--accent-soft);background:var(--surface)}
select.input{cursor:pointer}
textarea.input{resize:vertical;min-height:78px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:var(--rad-s);
  font-weight:700;font-size:14px;transition:transform .14s cubic-bezier(.2,.8,.2,1),filter .14s,box-shadow .14s,background .14s,border-color .14s;
  white-space:nowrap;letter-spacing:-.01em}
.btn:active{transform:translateY(0) scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#1A1206;width:100%;
  box-shadow:0 6px 18px -6px rgba(255,176,46,.55),inset 0 1px 0 rgba(255,255,255,.35)}
.btn-primary:hover{filter:brightness(1.07);transform:translateY(-1.5px);box-shadow:0 12px 26px -8px rgba(255,176,46,.6),inset 0 1px 0 rgba(255,255,255,.35)}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--border2);background:var(--surface3);transform:translateY(-1px)}
.btn-sm{padding:8px 13px;font-size:13px}
.btn-icon{width:38px;height:38px;padding:0;border-radius:var(--rad-s);background:var(--surface2);border:1px solid var(--border);
  display:grid;place-items:center;transition:.14s;color:var(--muted)}
.btn-icon:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
.auth-err{color:var(--danger);font-size:13px;margin-top:-2px;margin-bottom:12px;min-height:18px;font-weight:600}
.auth-foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:22px;letter-spacing:.02em}

/* ---------- APP SHELL ---------- */
#app{display:none}
.shell{display:flex;min-height:100vh;position:relative}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(circle at 70% 0%,#000,transparent 70%)}
.sidebar{width:252px;background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 97%,#fff 3%),var(--surface));
  border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;
  transition:width .24s cubic-bezier(.2,.8,.2,1)}
.sidebar.collapsed{width:72px}
.sb-head{padding:0 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);height:66px;flex:0 0 66px}
.sb-head .logo{width:38px;height:38px;flex:0 0 38px;border-radius:11px;background:linear-gradient(140deg,var(--accent),var(--accent-d));
  display:grid;place-items:center;color:#1A1206;font-weight:900;font-family:var(--display);font-size:19px;
  box-shadow:0 4px 12px -3px rgba(255,176,46,.5),inset 0 1px 0 rgba(255,255,255,.4)}
.sb-head .name{font-family:var(--display);font-weight:900;font-size:19px;letter-spacing:-.04em;white-space:nowrap}
.sb-head .name span{color:var(--accent)}
.collapsed .sb-head .name{display:none}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--rad-s);color:var(--muted);
  font-weight:600;font-size:14px;cursor:pointer;transition:.14s;margin-bottom:4px;position:relative;white-space:nowrap}
.nav-item svg{flex:0 0 20px;transition:.14s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item:hover svg{transform:scale(1.08)}
.nav-item.active{background:linear-gradient(100deg,var(--accent-soft),transparent);color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;
  background:var(--accent);box-shadow:0 0 12px var(--accent)}
.collapsed .nav-item .lbl{display:none}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:11px;font-weight:800;
  min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px;box-shadow:0 2px 8px -1px var(--danger)}
.collapsed .nav-badge{position:absolute;top:5px;right:5px;margin:0}
.sb-foot{padding:13px 12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--rad-s);background:var(--surface2);border:1px solid var(--border)}
.avatar{width:33px;height:33px;flex:0 0 33px;border-radius:10px;background:linear-gradient(140deg,var(--blueprint),var(--surface3));
  color:var(--blue);display:grid;place-items:center;font-weight:800;font-size:14px;font-family:var(--display);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.user-pill .meta{overflow:hidden;line-height:1.3}
.user-pill .meta b{font-size:13px;display:block;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
.user-pill .meta small{color:var(--faint);font-size:11px}
.collapsed .user-pill .meta{display:none}

.main{flex:1;margin-left:252px;transition:margin .24s cubic-bezier(.2,.8,.2,1);min-width:0;position:relative;z-index:1}
.main.wide{margin-left:72px}
.topbar{height:66px;border-bottom:1px solid var(--border);
  background:color-mix(in srgb,var(--surface) 72%,transparent);backdrop-filter:blur(16px) saturate(1.4);
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:13px;padding:0 26px}
.topbar h1{font-size:21px;letter-spacing:-.03em}
.topbar .spacer{flex:1}
.content{padding:28px 32px 70px;position:relative}
.page{display:none}
.page.active{display:block;animation:fade .42s cubic-bezier(.16,.84,.3,1)}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.page.active > *{animation:fade .5s cubic-bezier(.16,.84,.3,1) backwards}
.page.active > *:nth-child(2){animation-delay:.05s}
.page.active > *:nth-child(3){animation-delay:.1s}
.page.active > *:nth-child(4){animation-delay:.15s}

/* ---------- KPI ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(218px,1fr));gap:16px;margin-bottom:26px}
.kpi{background:linear-gradient(165deg,color-mix(in srgb,var(--surface) 94%,#fff 6%),var(--surface));
  border:1px solid var(--border);border-radius:var(--rad);padding:19px 21px;position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.2,.8,.2,1),border-color .2s,box-shadow .2s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border2);opacity:.7}
.kpi:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--shadow-s)}
.kpi::after{content:'';position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle,currentColor,transparent 70%);opacity:.06}
.kpi .klabel{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.kpi .kval{font-family:var(--display);font-weight:800;font-size:28px;margin-top:10px;letter-spacing:-.03em}
.kpi .ksub{font-size:12px;color:var(--faint);margin-top:5px}
.kpi.accent{color:var(--accent)} .kpi.accent::before{background:linear-gradient(90deg,var(--accent),transparent)} .kpi.accent .kval{color:var(--accent)}
.kpi.ok{color:var(--ok)} .kpi.ok::before{background:linear-gradient(90deg,var(--ok),transparent)} .kpi.ok .kval{color:var(--ok)}
.kpi.danger{color:var(--danger)} .kpi.danger::before{background:linear-gradient(90deg,var(--danger),transparent)} .kpi.danger .kval{color:var(--danger)}
.kpi.blue{color:var(--blue)} .kpi.blue::before{background:linear-gradient(90deg,var(--blue),transparent)} .kpi.blue .kval{color:var(--blue)}
.kpi.warn{color:var(--warn)} .kpi.warn::before{background:linear-gradient(90deg,var(--warn),transparent)} .kpi.warn .kval{color:var(--warn)}

/* ---------- CARDS ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:23px;
  box-shadow:0 1px 0 rgba(255,255,255,.02) inset;transition:border-color .2s}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:19px;gap:12px;flex-wrap:wrap}
.card-head h3{font-size:17px;letter-spacing:-.02em}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;
  font-family:var(--body);margin:28px 0 15px;display:flex;align-items:center;gap:11px}
.section-title::before{content:'';width:16px;height:2.5px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px var(--accent)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
.toolbar .grow{flex:1;min-width:160px}
.search{position:relative;flex:1;min-width:210px}
.search input{width:100%;padding-left:40px}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint)}
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:22px;background:var(--surface2);border:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.chip.active{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#1A1206;border-color:transparent;
  box-shadow:0 4px 12px -4px rgba(255,176,46,.5)}

/* ---------- OBRA CARDS ---------- */
.obra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(326px,1fr));gap:18px}
.obra-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;
  cursor:pointer;transition:transform .22s cubic-bezier(.2,.8,.2,1),border-color .22s,box-shadow .22s;position:relative}
.obra-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:var(--shadow)}
.obra-card .top{height:74px;position:relative;display:flex;align-items:flex-end;justify-content:space-between;padding:13px 16px;
  background:linear-gradient(120deg,var(--blueprint),color-mix(in srgb,var(--surface3) 80%,var(--blueprint)));
  background-image:repeating-linear-gradient(46deg,rgba(86,168,230,.10) 0,rgba(86,168,230,.10) 1px,transparent 1px,transparent 13px)}
.obra-card .top::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.12))}
.obra-card .code{position:relative;z-index:1;font-family:var(--mono);font-size:11px;color:var(--muted);
  background:color-mix(in srgb,var(--surface) 85%,transparent);padding:3px 9px;border-radius:7px;border:1px solid var(--border)}
.obra-card .body{padding:17px}
.obra-card h4{font-size:17.5px;margin-bottom:4px;letter-spacing:-.02em}
.obra-card .loc{font-size:12.5px;color:var(--muted);margin-bottom:15px;display:flex;align-items:center;gap:6px}
.obra-card .metrics{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.obra-card .metric small{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px}
.obra-card .metric b{font-family:var(--mono);font-size:15px;font-weight:700}
.alert-dot{position:absolute;top:11px;left:13px;z-index:2;width:23px;height:23px;border-radius:50%;background:var(--danger);
  color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px;box-shadow:0 0 0 4px var(--dangerbg);animation:pulse 1.9s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,93,98,.55)}50%{box-shadow:0 0 0 8px rgba(255,93,98,0)}}

/* ---------- BADGES ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:8px;letter-spacing:.01em;
  border:1px solid transparent}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.b-plan{background:var(--blueprint);color:var(--blue)} .b-and{background:var(--warnbg);color:var(--warn)}
.b-pausa{background:var(--surface3);color:var(--muted)} .b-conc{background:var(--okbg);color:var(--ok)}
.b-pago{background:var(--okbg);color:var(--ok)} .b-prev{background:var(--blueprint);color:var(--blue)} .b-pend{background:var(--warnbg);color:var(--warn)}

/* ---------- TABLES ---------- */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
  font-weight:700;padding:11px 13px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:13px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--surface2)}
.td-r{text-align:right;font-family:var(--mono)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;color:var(--muted);transition:.13s;border:1px solid transparent}
.icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border)}
.icon-btn.del:hover{color:var(--danger);background:var(--dangerbg);border-color:transparent}

/* ---------- PROGRESS / GAUGE ---------- */
.progress{height:9px;background:var(--surface3);border-radius:6px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.2)}
.progress > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent-d),var(--accent));
  transition:width .6s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 10px -1px var(--accent)}
.progress.over > i{background:linear-gradient(90deg,#b3322f,var(--danger));box-shadow:0 0 10px -1px var(--danger)}
.gauge{margin:15px 0;height:11px;border-radius:7px;background:var(--surface3);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.2)}
.gauge > i{display:block;height:100%;border-radius:7px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

.empty{text-align:center;padding:64px 20px;color:var(--faint)}
.empty svg{opacity:.35;margin-bottom:16px}
.empty p{font-size:15px;margin-bottom:20px}
.empty p b{color:var(--muted)}

/* ---------- TABS ---------- */
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.tab{padding:12px 17px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:.14s;font-size:14px;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ---------- FORMS ---------- */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:15px}
.fgrid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.input-suffix{position:relative}
.input-suffix .sfx{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;font-family:var(--mono);pointer-events:none}
.input-suffix .input{padding-right:48px}

/* ---------- VIABILITY ---------- */
.viab-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:22px;align-items:start}
.result-panel{background:
    radial-gradient(600px 300px at 100% 0%,var(--accent-soft),transparent 60%),
    linear-gradient(165deg,var(--surface3),var(--surface));
  border:1px solid var(--border2);border-radius:var(--rad);padding:26px;position:sticky;top:88px;box-shadow:var(--shadow-s);overflow:hidden}
.result-line{display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px dashed var(--border)}
.result-line:last-child{border-bottom:none}
.result-line .lab{color:var(--muted);font-size:13px;font-weight:600}
.result-line .num{font-family:var(--mono);font-weight:700;font-size:16px}
.result-hero{text-align:center;padding:18px 0 12px}
.result-hero small{text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-size:11px;font-weight:700}
.result-hero .big{font-family:var(--display);font-weight:900;font-size:40px;letter-spacing:-.04em;margin-top:5px;line-height:1}
.pos{color:var(--ok)} .neg{color:var(--danger)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(7,10,14,.72);backdrop-filter:blur(5px);z-index:90;
  display:none;align-items:flex-start;justify-content:center;padding:44px 16px;overflow-y:auto}
.overlay.open{display:flex;animation:fade .2s}
.modal{width:100%;max-width:680px;background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 96%,#fff 4%),var(--surface));
  border:1px solid var(--border2);border-radius:18px;box-shadow:var(--shadow);animation:modalIn .32s cubic-bezier(.16,.84,.3,1);margin:auto 0}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.modal.lg{max-width:900px}
.modal-head{padding:20px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:18px}
.modal-body{padding:26px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:17px 26px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* ---------- TOAST ---------- */
.toast-wrap{position:fixed;bottom:26px;right:26px;z-index:120;display:flex;flex-direction:column;gap:10px}
.toast{background:color-mix(in srgb,var(--surface3) 92%,transparent);backdrop-filter:blur(10px);
  border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:12px;padding:13px 18px;
  box-shadow:var(--shadow);font-weight:600;font-size:13.5px;animation:toastIn .3s cubic-bezier(.16,.84,.3,1);max-width:340px}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--danger)}

/* ---------- MISC ---------- */
.divider{height:1px;background:var(--border);margin:23px 0}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.flex{display:flex;align-items:center;gap:10px} .between{justify-content:space-between} .wrap{flex-wrap:wrap}
.mt{margin-top:14px} .mt-l{margin-top:26px} .mb{margin-bottom:14px}
.hint{font-size:12px;color:var(--faint);margin-top:6px;line-height:1.6}
.admin-only.hidden{display:none!important}
.bar-chart{display:flex;align-items:flex-end;gap:11px;height:180px;padding-top:10px}
.bar-chart .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bar-chart .bar .fill{width:100%;max-width:48px;border-radius:8px 8px 3px 3px;
  background:linear-gradient(180deg,var(--accent),var(--accent-d));transition:height .7s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 0 16px -4px var(--accent),inset 0 1px 0 rgba(255,255,255,.25);position:relative}
.bar-chart .bar:hover .fill{filter:brightness(1.12)}
.bar-chart .bar small{font-size:11px;color:var(--muted);text-align:center}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:14px}
.legend span{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:3px}

@media(max-width:860px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.mobile-open{transform:none;box-shadow:var(--shadow)}
  .main{margin-left:0}
  .viab-grid{grid-template-columns:1fr}
  .result-panel{position:static}
  .content{padding:20px 16px 50px}
  .menu-toggle-m{display:grid!important}
}
.menu-toggle-m{display:none}

/* ---- marca d'água + translucidez ---- */
.watermark{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:var(--logo);background-repeat:no-repeat;background-position:center 46%;
  background-size:min(560px,52vw);opacity:.05;filter:saturate(1.1)}
.card,.kpi{background-color:color-mix(in srgb,var(--surface) 90%,transparent)!important;backdrop-filter:blur(2px)}
.result-panel{backdrop-filter:blur(3px)}
.brand .logo,.sb-head .logo{background:#15120b!important;border:1px solid color-mix(in srgb,var(--accent) 26%,transparent);box-shadow:0 5px 16px -6px rgba(0,0,0,.55)!important;overflow:hidden;display:grid;place-items:center}
.brand .logo img,.sb-head .logo img{width:100%;height:100%;object-fit:contain}
.brand .logo .lmk,.sb-head .logo .lmk{height:70%;width:auto;display:block}
/* ---- welcome ---- */
#welcome{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  background:radial-gradient(900px 600px at 50% 40%,rgba(255,176,46,.10),transparent 60%),var(--bg);
  flex-direction:column;gap:18px}
#welcome.show{display:flex;animation:wmIn .5s ease}
#welcome.out{animation:wmOut .6s ease forwards}
@keyframes wmIn{from{opacity:0}to{opacity:1}}
@keyframes wmOut{to{opacity:0;visibility:hidden}}
#welcome .wlogo{width:120px;height:158px;background-image:var(--logo);background-position:center;background-size:contain;background-repeat:no-repeat;
  animation:wpop .7s cubic-bezier(.16,.84,.3,1);filter:drop-shadow(0 8px 30px rgba(255,176,46,.3))}
@keyframes wpop{0%{transform:scale(.6) translateY(20px);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
#welcome .whi{font-family:var(--display);font-weight:800;font-size:15px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;
  animation:fade .6s .25s backwards}
#welcome .wname{font-family:var(--display);font-weight:900;font-size:40px;letter-spacing:-.03em;
  background:linear-gradient(120deg,var(--accent),#fff,var(--accent));background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 2.2s linear infinite,fade .6s .35s backwards}
@keyframes shine{to{background-position:200% center}}
/* ---- progresso geral ---- */
.led{box-shadow:0 0 16px -2px var(--accent),inset 0 0 0 1px rgba(255,176,46,.25)}

/* ---- cronograma / gantt ---- */
.cron-stat{display:flex;flex-direction:column;gap:3px;padding:14px 16px;border-radius:var(--rad-s);background:var(--surface2);border:1px solid var(--border);min-width:0}
.cron-stat b{font-size:23px;font-family:var(--mono);line-height:1}
.cron-stat small{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
.gantt{position:relative;margin-top:6px}
.gantt-head{display:flex;justify-content:space-between;color:var(--faint);font-size:11px;font-family:var(--mono);margin:0 0 4px calc(var(--gl, 200px));padding:0 2px}
.gantt-row{display:grid;grid-template-columns:var(--gl, 200px) 1fr;align-items:center;gap:14px;padding:7px 0}
.gantt-label{min-width:0}
.gantt-label .n{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-label .d{color:var(--faint);font-size:11px;font-family:var(--mono)}
.gantt-track{position:relative;height:30px;background:var(--surface2);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.gantt-bar{position:absolute;top:3px;bottom:3px;border-radius:6px;background:var(--surface3);overflow:hidden;min-width:8px;transition:left .3s,width .3s}
.gantt-bar .gf{position:absolute;inset:0;border-radius:6px;transition:width .45s cubic-bezier(.16,.84,.3,1)}
.gantt-bar .gp{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10.5px;font-family:var(--mono);font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.gantt-today{position:absolute;top:-16px;bottom:0;width:2px;background:var(--accent);z-index:3;box-shadow:0 0 8px var(--accent)}
.gantt-today::before{content:'hoje';position:absolute;top:-3px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--accent);font-family:var(--mono);font-weight:700}
@media(max-width:640px){.gantt-head{margin-left:0;display:none}.gantt-row{grid-template-columns:1fr;gap:5px}.gantt-track{--gl:0}}
.st-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.st-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor}
.st-none{color:var(--faint);background:color-mix(in srgb,var(--faint) 16%,transparent)}
.st-prog{color:var(--blue);background:color-mix(in srgb,var(--blue) 16%,transparent)}
.st-late{color:var(--danger);background:color-mix(in srgb,var(--danger) 16%,transparent)}
.st-done{color:var(--ok);background:color-mix(in srgb,var(--ok) 16%,transparent)}
.etapa-card{padding:16px;border:1px solid var(--border);border-radius:var(--rad-s);background:var(--surface2);margin-bottom:12px;transition:border-color .25s,box-shadow .25s;position:relative;overflow:hidden}
.etapa-card.late{border-color:color-mix(in srgb,var(--danger) 45%,var(--border))}
.etapa-card.done{border-color:color-mix(in srgb,var(--ok) 45%,var(--border));box-shadow:0 0 0 1px color-mix(in srgb,var(--ok) 20%,transparent)}

/* ===== barra de progresso interativa — premium ===== */
.pbar{position:relative;height:44px;border-radius:13px;background:var(--surface);border:1px solid var(--border);
  cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin-top:14px;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.16)}
.pbar:active{cursor:grabbing}
.pbar .ptrack{position:absolute;inset:0;border-radius:13px;overflow:hidden}
.pbar .pfill{position:absolute;left:0;top:0;bottom:0;border-radius:13px 0 0 13px;
  background:linear-gradient(180deg,color-mix(in srgb,var(--pcol,var(--accent)) 82%,#fff),var(--pcol,var(--accent)));
  transition:width .14s cubic-bezier(.22,.61,.36,1),background .25s}
.pbar .pfill::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);background-size:200% 100%;
  opacity:0;transition:opacity .25s;animation:pshine 2s linear infinite}
.pbar:hover .pfill::after,.pbar.dragging .pfill::after{opacity:1}
@keyframes pshine{to{background-position:-200% 0}}
.pbar.sweep .pfill{transition:width .62s cubic-bezier(.16,.84,.3,1),background .3s}
.pbar.sweep .phandle{transition:left .62s cubic-bezier(.16,.84,.3,1),transform .14s,box-shadow .14s,border-color .25s}
.pbar.sweep .pbub{transition:left .62s cubic-bezier(.16,.84,.3,1),opacity .2s}
/* marcador de PLANO: onde a etapa deveria estar hoje (pelas datas) */
.pbar .pplan{position:absolute;top:-7px;bottom:-7px;width:0;border-left:2px dashed color-mix(in srgb,var(--text) 40%,transparent);z-index:2;pointer-events:none}
.pbar .pplan::after{content:'plano';position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:8px;font-family:var(--mono);font-weight:700;color:var(--muted);letter-spacing:.04em}
.pbar .ptick{position:absolute;top:9px;bottom:9px;width:1px;background:color-mix(in srgb,var(--faint) 38%,transparent);pointer-events:none;z-index:1}
.pbar .ppct{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-weight:800;font-size:13px;color:var(--text);pointer-events:none;z-index:3;text-shadow:0 1px 2px var(--surface)}
.pbar .phandle{position:absolute;top:50%;width:26px;height:26px;border-radius:50%;background:#fff;
  border:3px solid var(--pcol,var(--accent));box-shadow:0 2px 8px rgba(0,0,0,.34);transform:translate(-50%,-50%);
  transition:left .14s cubic-bezier(.22,.61,.36,1),transform .14s,box-shadow .14s,border-color .25s;z-index:4;
  display:grid;place-items:center}
.pbar .phandle::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--pcol,var(--accent));transition:background .25s}
.pbar.dragging .phandle,.pbar:hover .phandle{transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 0 0 7px color-mix(in srgb,var(--pcol,var(--accent)) 18%,transparent),0 2px 10px rgba(0,0,0,.35)}
.pbar .pbub{position:absolute;top:-34px;transform:translateX(-50%);background:var(--pcol,var(--accent));color:#1A1206;
  font-family:var(--mono);font-weight:800;font-size:12px;padding:4px 9px;border-radius:8px;pointer-events:none;
  opacity:0;transition:opacity .18s,left .14s cubic-bezier(.22,.61,.36,1);white-space:nowrap;z-index:5;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.pbar .pbub::after{content:'';position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--pcol,var(--accent))}
.pbar.dragging .pbub,.pbar:hover .pbub,.pbar:focus-visible .pbub{opacity:1}
.pbar.done{--pcol:var(--ok)}
.pbar.done .pfill{box-shadow:0 0 20px -3px color-mix(in srgb,var(--ok) 75%,transparent)}
.pbar:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@keyframes pdone{0%{box-shadow:inset 0 2px 5px rgba(0,0,0,.16),0 0 0 0 color-mix(in srgb,var(--ok) 65%,transparent)}
  100%{box-shadow:inset 0 2px 5px rgba(0,0,0,.16),0 0 0 18px transparent}}
.pbar.cheer{animation:pdone .7s ease-out}
/* leitura plano x real */
.prog-meta{font-size:12px;font-weight:600;margin-top:9px;display:flex;align-items:center;gap:6px}
.prog-meta .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
/* chips + botão */
.pchips{display:flex;gap:6px;flex-wrap:wrap}
.pchip{font-family:var(--mono);font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:.15s}
.pchip:hover{border-color:var(--accent);color:var(--text);transform:translateY(-1px)}
.pchip.on{background:var(--accent);color:#1A1206;border-color:var(--accent)}
.pbar.done ~ .prog-foot .pchip.on{background:var(--ok);border-color:var(--ok)}
.pdone-btn{position:relative;overflow:hidden}
.pdone-btn svg{vertical-align:-2px;margin-right:3px}
/* confete */
.confetti{position:absolute;width:9px;height:9px;border-radius:2px;z-index:20;pointer-events:none;will-change:transform,opacity;
  animation:confpop var(--dur,900ms) cubic-bezier(.18,.7,.4,1) forwards}
@keyframes confpop{0%{transform:translate(0,0) rotate(0);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}}

</style>
</head>

// máscara de moeda pt-BR (pontuação automática enquanto digita)
function maskMoneyVal(raw){
  let d=(raw||'').replace(/\D/g,'').replace(/^0+/,'');
  if(!d) return '';
  while(d.length<3) d='0'+d;
  const cents=d.slice(-2), intp=d.slice(0,-2);
  return intp.replace(/\B(?=(\d{3})+(?!\d))/g,'.')+','+cents;
}
function applyMoney(root){
  (root||document).querySelectorAll('input.money').forEach(el=>{
    if(el.dataset.money) return; el.dataset.money='1';
    const raw=(el.value||'').trim();
    if(raw!==''){ const n=parseFloat(raw.replace(/\./g,'').replace(',','.')); el.value=isFinite(n)?maskMoneyVal(String(Math.round(n*100))):''; }
    el.addEventListener('input',()=>{ el.value=maskMoneyVal(el.value); });
  });
}

// status automático de uma etapa
function etapaStatus(e){
  const p=+e.prog||0, hoje=hojeStr();
  if(p>=100) return {key:'done',label:'Concluída',cls:'st-done',col:'var(--ok)'};
  if(e.fim && e.fim<hoje) return {key:'late',label:'Atrasada',cls:'st-late',col:'var(--danger)'};
  if(p>0) return {key:'prog',label:'Em andamento',cls:'st-prog',col:'var(--blue)'};
  return {key:'none',label:'Não iniciada',cls:'st-none',col:'var(--surface3)'};
}
// progresso ESPERADO de uma etapa hoje, segundo o cronograma (datas)
function plannedPct(e){
  if(!e.inicio||!e.fim)return null;
  const hoje=hojeStr();
  if(hoje<=e.inicio)return 0;
  if(hoje>=e.fim)return 100;
  const tot=daysBetween(e.inicio,e.fim)||1, dec=daysBetween(e.inicio,hoje)||0;
  return Math.max(0,Math.min(100,Math.round(dec/tot*100)));
}

// soma N meses a uma data (trata overflow de dias, ex: 31/01 + 1 mês = 28/02)
function addMonths(dateStr,months){
  if(!dateStr||!(months>0))return '';
  const d=new Date(dateStr+'T00:00'),day=d.getDate();
  d.setMonth(d.getMonth()+Math.round(months));
  if(d.getDate()<day)d.setDate(0);
  return d.toISOString().slice(0,10);
}
// nº de meses cheios entre duas datas
function monthsBetween(a,b){
  if(!a||!b)return '';
  const d1=new Date(a+'T00:00'),d2=new Date(b+'T00:00');
  let m=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth());
  if(d2.getDate()<d1.getDate())m--;
  return m>0?m:'';
}

  const ini=document.getElementById('f_ini').value, meses=num(document.getElementById('f_prazo').value);
  if(ini&&meses>0)document.getElementById('f_fim').value=addMonths(ini,meses);
}
// se a pessoa editar a data de término manualmente, recalcula o prazo em meses
function calcPrazo(){
  const ini=document.getElementById('f_ini').value, fim=document.getElementById('f_fim').value;
  if(ini&&fim){const m=monthsBetween(ini,fim);if(m)document.getElementById('f_prazo').value=m;}
}

/* ---------- estimativa de impostos de fim de obra ----------
   Aproximação para planejamento (não é cálculo fiscal oficial).
   Considera tamanho da obra (área), nº de unidades e qualificação (padrão). */
function estimaFimObra(o){
  const area=+o.areaConstruida||0;
  const cub=(o.useCustoTotalM2 && +o.custoTotalM2>0) ? +o.custoTotalM2 : (+o.custoConstrucaoM2||0);
  const valorObra=area*cub;                       // valor (custo) da obra
  const q=QUALIF_FATOR[o.qualificacao]||QUALIF_FATOR['Normal'];
  const cmo=valorObra*q.mo;                        // remuneração de mão de obra estimada
  const inss=cmo*INSS_OBRA;                        // INSS / aferição (CNO)
  const iss=cmo*q.iss;                             // ISS no habite-se
  const unidades=Math.max(1,+o.numUnidades||1);
  const cartorio=valorObra*CART_PCT + unidades*CART_UNID; // averbação + individualização + encerramento afetação
  const outras=valorObra*OUTRAS_PCT;               // habite-se, CND, baixa RET
  const total=inss+iss+cartorio+outras;
  const pct=valorObra>0 ? total/valorObra*100 : 0;
  return {valorObra,cmo,inss,iss,cartorio,outras,total,pct,unidades};
}

/* ---------- VGV / cálculos ---------- */
function calc(o){
  const areaVend=+o.areaVendavel||0, areaConstr=+o.areaConstruida||0;
  let precoM2 = +o.precoVendaM2||0;
  if(o.useValorUnidade && +o.metragemUnidade>0) precoM2 = (+o.valorUnidade||0)/(+o.metragemUnidade);
  const vgv = (+o.vgvManual>0) ? +o.vgvManual : areaVend*precoM2;
  const simple = !!o.useCustoTotalM2 && +o.custoTotalM2>0;
  const impEst = estimaFimObra(o);
  const impostoFO = (o.impostoFimObra===''||o.impostoFimObra==null) ? impEst.total : +o.impostoFimObra;
  let custoConstr=0,custoTerreno=+o.custoTerreno||0,custoIndireto=0,custoTaxas=0,comissao=0,custoTotal=0,custoTotalM2=0;
  if(simple){
    custoTotalM2=+o.custoTotalM2||0;
    custoTotal=areaConstr*custoTotalM2 + custoTerreno + impostoFO;
  }else{
    custoConstr = areaConstr*(+o.custoConstrucaoM2||0);
    custoIndireto=+o.custosIndiretosValor||0;
    if(+o.custosIndiretosPct>0) custoIndireto += custoConstr*(+o.custosIndiretosPct/100);
    custoTaxas=+o.custoProjetosTaxas||0;
    comissao = vgv*(+o.comissaoVendasPct||0)/100;
    custoTotal = custoTerreno+custoConstr+custoIndireto+custoTaxas+comissao+impostoFO;
    custoTotalM2 = areaConstr>0 ? custoTotal/areaConstr : 0;
  }
  const impostoPctObra = impEst.valorObra>0 ? impostoFO/impEst.valorObra*100 : 0;
  const realizado=(o.lancamentos||[]).filter(l=>l.status==='Pago').reduce((s,l)=>s+(+l.valorRealizado||+l.valorPrevisto||0),0);
  const compromissado=(o.lancamentos||[]).reduce((s,l)=>s+(+l.valorRealizado||+l.valorPrevisto||0),0);
  const lucro = vgv-custoTotal;
  const margem = vgv>0 ? lucro/vgv*100 : 0;
  const roi = custoTotal>0 ? lucro/custoTotal*100 : 0;
  const lucroM2 = areaConstr>0 ? lucro/areaConstr : 0;
  return {simple,precoM2,vgv,custoConstr,custoTerreno,custoIndireto,custoTaxas,comissao,impostoFO,impEst,impostoPctObra,custoTotal,custoTotalM2,realizado,compromissado,lucro,margem,roi,lucroM2,areaVend,areaConstr};
}
function obraAlert(o){ // estouro de orçamento (compromissado > custo total estimado) ou margem negativa
  const c=calc(o);
  if(c.custoTotal>0 && c.compromissado>c.custoTotal) return 'over';
  if(c.vgv>0 && c.lucro<0) return 'neg';
  return null;
}

/* ---------- auth (Firebase) ---------- */
const isAdmin=()=>session&&session.role==='Administrador';
function setAuthBusy(b){const btn=document.getElementById('loginBtn'); if(btn){btn.disabled=b; btn.textContent=b?'Entrando…':'Entrar';}}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr'); err.textContent='';
  if(!email||!p){err.textContent='Informe e-mail e senha.';return;}
  setAuthBusy(true);
  try{ await auth.signInWithEmailAndPassword(email,p); }
  catch(e){ setAuthBusy(false);
    err.textContent = (e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found')
      ? 'E-mail ou senha inválidos.' : (e.code==='auth/too-many-requests'?'Muitas tentativas. Tente mais tarde.':'Erro: '+e.code);
  }
}
async function forgotPass(){
  const email=document.getElementById('loginEmail').value.trim();
  const err=document.getElementById('loginErr'); err.textContent='';
  if(!email){err.textContent='Digite seu e-mail acima para receber o link.';return;}
  try{ await auth.sendPasswordResetEmail(email); toast('Link de redefinição enviado para '+email,'ok'); }
  catch(e){ err.textContent='Não foi possível enviar: '+e.code; }
}
function logout(){ detachListeners(); if(unsubSelf){unsubSelf();unsubSelf=null;} auth.signOut(); }

let bootstrapping=false;
// reage a login/logout
function bootAuth(){
  loadTheme();
  auth.onAuthStateChanged(async user=>{
    if(bootstrapping) return;            // ignora transições durante a criação do 1º admin
    if(!user){ showAuthScreen(); return; }
    loadProfileAndEnter(user);
  });
}
async function loadProfileAndEnter(user){
  try{
    const snap=await db.collection('users').doc(user.uid).get();
    if(!snap.exists){ await auth.signOut(); showAuthScreen('Sua conta ainda não foi liberada pelo administrador.'); return; }
    const u=snap.data();
    if(u.ativo===false){ await auth.signOut(); showAuthScreen('Conta desativada. Procure o administrador.'); return; }
    session={uid:user.uid,name:u.name||user.email,email:user.email,role:u.role||'Usuário'};
    if(unsubSelf)unsubSelf();
    unsubSelf=db.collection('users').doc(user.uid).onSnapshot(s=>{
      if(!s.exists||s.data().ativo===false){ toast('Sua conta foi desativada.','err'); setTimeout(()=>logout(),1200); return; }
      const d=s.data(); if(session){session.role=d.role||'Usuário'; session.name=d.name||session.name;}
    });
    enterApp();
  }catch(e){ await auth.signOut(); showAuthScreen('Erro ao carregar seu perfil: '+e.code); }
}
// cria o primeiro administrador direto pelo app (sem precisar do console)
async function doSetupAdmin(){
  const name=document.getElementById('suName').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  const p=document.getElementById('suPass').value;
  const err=document.getElementById('suErr'); err.textContent='';
  if(!name||!email||!p){err.textContent='Preencha todos os campos.';return;}
  if(p.length<6){err.textContent='A senha precisa de ao menos 6 caracteres.';return;}
  const btn=document.getElementById('suBtn'); btn.disabled=true; btn.textContent='Criando…';
  bootstrapping=true;
  try{
    let cred;
    try{ cred=await auth.createUserWithEmailAndPassword(email,p); }
    catch(e){ if(e.code==='auth/email-already-in-use'){ cred=await auth.signInWithEmailAndPassword(email,p); } else throw e; }
    const u=cred.user;
    await db.collection('users').doc(u.uid).set({name,email,role:'Administrador',ativo:true,createdAt:Date.now()},{merge:true});
    await db.collection('meta').doc('config').set({setupDone:true,owner:u.uid,createdAt:Date.now()},{merge:true});
    bootstrapping=false;
    toast('Administrador criado','ok');
    loadProfileAndEnter(u);
  }catch(e){
    bootstrapping=false; btn.disabled=false; btn.textContent='Criar administrador';
    err.textContent = (e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')
      ? 'Esse e-mail já existe, mas a senha não confere.'
      : e.code==='auth/invalid-email' ? 'E-mail inválido.' : 'Erro: '+e.code;
  }
}
function setAuthMode(mode){ // 'login' | 'setup'
  const setup=mode==='setup';
  document.getElementById('loginForm').style.display=setup?'none':'block';
  document.getElementById('setupForm').style.display=setup?'block':'none';
  document.getElementById('authSub').textContent=setup
    ? 'Primeiro acesso — crie a conta de administrador do sistema.'

  document.getElementById('authFoot').textContent=setup
    ? 'Esta etapa só aparece uma vez, no primeiro acesso.'

async function showAuthScreen(msg){

        ${rowKV('Início',dateBR(o.dataInicio))}

        ${c.simple
          ? rowKV('Custo total ('+fmtArea(o.areaConstruida)+' × '+fmtBRL2(c.custoTotalM2)+'/m²)',fmtBRL(c.custoTotal))
          : rowKV('Custo do terreno',fmtBRL(c.custoTerreno))
            +rowKV('Construção ('+fmtArea(o.areaConstruida)+' × '+fmtBRL2(+o.custoConstrucaoM2||0)+'/m²)',fmtBRL(c.custoConstr))
            +rowKV('Custos indiretos',fmtBRL(c.custoIndireto))
            +rowKV('Projetos / taxas',fmtBRL(c.custoTaxas))
            +rowKV('Comissão de vendas',fmtBRL(c.comissao))
            +rowKV('Imposto de fim de obra ('+fmtPct(c.impostoPctObra)+' do valor da obra)',fmtBRL(c.impostoFO))}
      </div>`:`<div class="card"><div class="card-head"><h3>Notas</h3></div><p class="muted">${esc(o.notas||'Sem observações.')}</p></div>`}
    </div>
    ${o.notas&&isAdmin()?`<div class="card mt"><div class="card-head"><h3>Observações</h3></div><p class="muted">${esc(o.notas)}</p></div>`:''}
  `;
}

function obraCron(o){
  const canEdit=canEditObra(o);
  const et=(o.etapas||[]).slice().sort((a,b)=>(a.inicio||'9999').localeCompare(b.inicio||'9999'));
  // progresso geral (ponderado pela duração quando há datas)
  let wsum=0,psum=0,ssum=0;
  et.forEach(e=>{const d=Math.max(1,daysBetween(e.inicio,e.fim)||1);wsum+=d;psum+=d*(+e.prog||0);ssum+=(+e.prog||0);});
  const geral=et.length?Math.round(wsum?psum/wsum:ssum/et.length):0;
  const nDone=et.filter(e=>etapaStatus(e).key==='done').length;
  const nProg=et.filter(e=>etapaStatus(e).key==='prog').length;
  const nLate=et.filter(e=>etapaStatus(e).key==='late').length;
  // range do gantt (datas das etapas, ou datas da obra como fallback)
  const ds=et.flatMap(e=>[e.inicio,e.fim]).filter(Boolean).concat([o.dataInicio,o.dataPrevisaoTermino].filter(Boolean));
  const rngStart=ds.length?ds.reduce((a,b)=>a<b?a:b):null;
  const rngEnd=ds.length?ds.reduce((a,b)=>a>b?a:b):null;
  const total=Math.max(1,daysBetween(rngStart,rngEnd)||1);
  const pos=d=>Math.max(0,Math.min(100,(daysBetween(rngStart,d)||0)/total*100));
  const hoje=hojeStr();
  const todayPct=(rngStart&&rngEnd&&hoje>=rngStart&&hoje<=rngEnd)?pos(hoje):null;
  const geralCol=geral>=100?'var(--ok)':geral>0?'var(--accent)':'var(--surface3)';
  // contexto para arrasto e cálculo do geral ao vivo
  cronCtx={obraId:o.id,items:{}};
  et.forEach(e=>{const w=Math.max(1,daysBetween(e.inicio,e.fim)||1);cronCtx.items[e.id]={w,p:+e.prog||0,col:etapaStatus(e).col,e};});

  const ganttRows=et.map(e=>{
    const s=etapaStatus(e); const has=e.inicio&&e.fim;
    const left=has?pos(e.inicio):0, width=has?Math.max(2.5,pos(e.fim)-pos(e.inicio)):100;
    const p=+e.prog||0;
    return `<div class="gantt-row">
      <div class="gantt-label"><div class="n">${esc(e.nome)}</div><div class="d">${has?dateBR(e.inicio)+' → '+dateBR(e.fim):'sem datas'}</div></div>
      <div class="gantt-track">
        ${todayPct!=null?`<div class="gantt-today" style="left:${todayPct}%"></div>`:''}
        <div class="gantt-bar" id="g_bar_${e.id}" style="left:${left}%;width:${width}%">
          <div class="gf" id="g_fill_${e.id}" style="width:${p}%;background:${s.col}"></div>
          <span class="gp" id="g_pct_${e.id}">${p}%</span>
        </div>
      </div></div>`;
  }).join('');

  const cards=et.map(e=>{
    const s=etapaStatus(e); const p=+e.prog||0;
    const dleft=e.fim?daysBetween(hoje,e.fim):null;
    const dur=daysBetween(e.inicio,e.fim);
    const plan=plannedPct(e);
    const prazoTxt = s.key==='done' ? 'Concluída'
      : dleft==null ? ''
      : dleft<0 ? `<span style="color:var(--danger)">atrasada ${Math.abs(dleft)} dia${Math.abs(dleft)>1?'s':''}</span>`
      : dleft===0 ? `<span style="color:var(--accent)">vence hoje</span>`
      : `faltam ${dleft} dia${dleft>1?'s':''}`;
    // leitura plano × real (em pontos percentuais)
    let metaHTML='';
    if(plan!=null && p<100){
      const diff=p-plan;
      if(diff>=8) metaHTML=`<div class="prog-meta" style="color:var(--ok)"><span class="dot" style="background:var(--ok)"></span>Adiantada — ${diff} p.p. à frente do plano (${plan}%)</div>`;
      else if(diff<=-8) metaHTML=`<div class="prog-meta" style="color:var(--danger)"><span class="dot" style="background:var(--danger)"></span>Atrasada — ${Math.abs(diff)} p.p. abaixo do plano (${plan}%)</div>`;
      else metaHTML=`<div class="prog-meta" style="color:var(--muted)"><span class="dot" style="background:var(--blue)"></span>No ritmo do cronograma (plano hoje: ${plan}%)</div>`;
    }
    return `<div class="etapa-card ${s.key==='late'?'late':s.key==='done'?'done':''}" id="ec_${e.id}">
      <div class="flex between wrap" style="gap:8px">
        <div class="flex" style="gap:10px;align-items:center"><b style="font-size:15px">${esc(e.nome)}</b><span class="st-pill ${s.cls}" id="sp_${e.id}">${s.label}</span></div>
        ${isAdmin()?`<div class="flex" style="gap:6px"><a onclick="openEtapaModal('${o.id}','${e.id}')" style="cursor:pointer;font-size:12.5px;font-weight:600">editar</a>
          <a onclick="delEtapa('${o.id}','${e.id}')" style="cursor:pointer;font-size:12.5px;font-weight:600;color:var(--danger)">excluir</a></div>`:''}
      </div>
      <div class="hint" style="margin-top:4px">${e.inicio||e.fim?`${dateBR(e.inicio)} → ${dateBR(e.fim)}${dur?` · ${dur} dia${dur>1?'s':''}`:''}`:'Sem datas definidas'}${prazoTxt?` · ${prazoTxt}`:''}</div>
      ${canEdit?`
      <div class="pbar ${p>=100?'done':''}" id="pb_${e.id}" tabindex="0" role="slider"
           aria-valuenow="${p}" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso de ${esc(e.nome)}"
           style="--pcol:${s.col}"
           onpointerdown="cronDown(event,'${o.id}','${e.id}')" onpointermove="cronMove(event,'${o.id}','${e.id}')"
           onpointerup="cronUp(event,'${o.id}','${e.id}')" onpointercancel="cronUp(event,'${o.id}','${e.id}')"
           onkeydown="cronKey(event,'${o.id}','${e.id}')">
        <div class="ptrack"><div class="pfill" id="pf_${e.id}" style="width:${p}%;background:${p>=100?'var(--ok)':s.col}"></div></div>
        <div class="ptick" style="left:25%"></div><div class="ptick" style="left:50%"></div><div class="ptick" style="left:75%"></div>
        ${plan!=null&&plan>0&&plan<100?`<div class="pplan" style="left:${plan}%" title="Plano: a etapa deveria estar em ${plan}% hoje"></div>`:''}
        <span class="ppct" id="pp_${e.id}">${p}%</span>
        <div class="phandle" id="ph_${e.id}" style="left:${p}%"></div>
        <div class="pbub" id="pbb_${e.id}" style="left:${p}%">${p}%</div>
      </div>
      ${metaHTML?`<div id="pm_${e.id}">${metaHTML}</div>`:`<div id="pm_${e.id}"></div>`}
      <div class="prog-foot flex between wrap" style="gap:10px;margin-top:11px;align-items:center">
        <div class="pchips">${[0,25,50,75,100].map(t=>`<button class="pchip ${p===t?'on':''}" id="pc_${e.id}_${t}" onclick="cronChip('${o.id}','${e.id}',${t})">${t}%</button>`).join('')}</div>
        <button class="btn ${p>=100?'btn-ghost':'btn-primary'} btn-sm pdone-btn" id="pd_${e.id}" style="width:auto;white-space:nowrap;padding:8px 16px" onclick="cronToggleDone('${o.id}','${e.id}')">${doneBtnHTML(p>=100)}</button>
      </div>`
      :`<div class="progress ${p>=100?'led':''}" style="margin-top:10px"><i style="width:${p}%;${p<100?`background:${s.col}`:''}"></i></div>
        <div class="flex between" style="margin-top:8px"><span class="muted hint">Progresso</span><span class="mono" style="font-weight:700">${p}%</span></div>`}
    </div>`;
  }).join('');

  document.getElementById('obraTabBody').innerHTML=`
    <div class="card">
      <div class="card-head"><h3>Progresso da obra</h3>
        ${isAdmin()?`<button class="btn btn-primary btn-sm" style="width:auto;padding:8px 14px" onclick="openEtapaModal('${o.id}')">+ Etapa</button>`:''}</div>
      ${et.length?`
      <div class="flex" style="gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
        <div style="flex:1;min-width:200px">
          <div class="flex between mb"><span class="muted">Conclusão geral</span><b class="mono" id="cronGeralVal" style="font-size:18px;color:${geralCol}">${geral}%</b></div>
          <div class="progress ${geral>=100?'led':''}" style="height:14px"><i id="cronGeralFill" style="width:${geral}%;background:${geralCol}"></i></div>
        </div>
      </div>
      <div class="cron-kpis" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:14px 0 4px">
        <div class="cron-stat"><b>${et.length}</b><small>Etapas</small></div>
        <div class="cron-stat"><b style="color:var(--ok)">${nDone}</b><small>Concluídas</small></div>
        <div class="cron-stat"><b style="color:var(--blue)">${nProg}</b><small>Em andamento</small></div>
        <div class="cron-stat"><b style="color:${nLate?'var(--danger)':'inherit'}">${nLate}</b><small>Atrasadas</small></div>
      </div>`:''}
    </div>
    ${et.length?`<div class="card mt"><div class="card-head"><h3>Linha do tempo</h3>
        <span class="muted mono" style="font-size:11px">${rngStart?dateBR(rngStart)+' → '+dateBR(rngEnd):''}</span></div>
      <div class="gantt"><div class="gantt-head"><span>início</span><span>término</span></div>${ganttRows}</div>
    </div>
    <div class="card mt"><div class="card-head"><h3>Etapas</h3></div>${cards}</div>`
    :emptyHTML('Sem etapas cadastradas',null,isAdmin()?`openEtapaModal('${o.id}')`:null,'+ Adicionar etapa')}`;
}
// ===== barra de progresso interativa (arrastável) =====
let cronCtx={items:{}}, cronDragging=null;
function cronColor(p,base){ return p>=100?'var(--ok)':(p>0?(base||'var(--accent)'):'var(--surface3)'); }
// HTML do botão concluir/reabrir (com ícone)
function doneBtnHTML(done){
  return done
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>Reabrir`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Concluir`;
}
// posição → % com ímã em 0/25/50/75/100 e passo de 5
function cronPct(el,clientX){
  const r=el.getBoundingClientRect(); let raw=Math.max(0,Math.min(100,(clientX-r.left)/r.width*100));
  for(const t of [0,25,50,75,100]) if(Math.abs(raw-t)<3) return t;
  return Math.round(raw/5)*5;
}
// aplica visual (card + gantt + chips + botão + status + geral) sem gravar
function cronApply(eid,p){
  const it=cronCtx.items&&cronCtx.items[eid]; if(it)it.p=p;
  const col=(it&&it.e)?etapaStatus({...it.e,prog:p}).col:cronColor(p);
  const set=(id,fn)=>{const el=document.getElementById(id);if(el)fn(el);};
  set('pf_'+eid,el=>{el.style.width=p+'%';el.style.background=col;});
  set('pp_'+eid,el=>el.textContent=p+'%');
  set('ph_'+eid,el=>el.style.left=p+'%');
  set('pbb_'+eid,el=>{el.style.left=p+'%';el.textContent=p+'%';});
  set('pb_'+eid,el=>{el.classList.toggle('done',p>=100);el.setAttribute('aria-valuenow',p);el.style.setProperty('--pcol',col);});
  set('g_fill_'+eid,el=>{el.style.width=p+'%';el.style.background=col;});
  set('g_pct_'+eid,el=>el.textContent=p+'%');
  [0,25,50,75,100].forEach(t=>set('pc_'+eid+'_'+t,el=>el.classList.toggle('on',p===t)));
  set('pd_'+eid,el=>{const d=p>=100;el.innerHTML=doneBtnHTML(d);el.classList.toggle('btn-primary',!d);el.classList.toggle('btn-ghost',d);});
  // status pill + leitura plano×real ao vivo
  if(it&&it.e){const e2={...it.e,prog:p}; const s2=etapaStatus(e2);
    set('sp_'+eid,el=>{el.className='st-pill '+s2.cls;el.textContent=s2.label;});
    set('ec_'+eid,el=>{el.classList.toggle('done',s2.key==='done');el.classList.toggle('late',s2.key==='late');});
    set('pm_'+eid,el=>{el.innerHTML=metaReadout(it.e,p);});
  }
  cronUpdateGeral();
}
// leitura "adiantada/atrasada/no ritmo" ao vivo
function metaReadout(e,p){
  const plan=plannedPct(e); if(plan==null||p>=100)return '';
  const diff=p-plan;
  if(diff>=8)return `<div class="prog-meta" style="color:var(--ok)"><span class="dot" style="background:var(--ok)"></span>Adiantada — ${diff} p.p. à frente do plano (${plan}%)</div>`;
  if(diff<=-8)return `<div class="prog-meta" style="color:var(--danger)"><span class="dot" style="background:var(--danger)"></span>Atrasada — ${Math.abs(diff)} p.p. abaixo do plano (${plan}%)</div>`;
  return `<div class="prog-meta" style="color:var(--muted)"><span class="dot" style="background:var(--blue)"></span>No ritmo do cronograma (plano hoje: ${plan}%)</div>`;
}
// recalcula o % geral ao vivo (ponderado pela duração)
function cronUpdateGeral(){
  if(!cronCtx.items)return; let w=0,ps=0;
  Object.values(cronCtx.items).forEach(it=>{w+=it.w;ps+=it.w*it.p;});
  const g=w?Math.round(ps/w):0, col=g>=100?'var(--ok)':g>0?'var(--accent)':'var(--surface3)';
  const v=document.getElementById('cronGeralVal'), f=document.getElementById('cronGeralFill');
  if(v){v.textContent=g+'%';v.style.color=col;}
  if(f){f.style.width=g+'%';f.style.background=col;if(f.parentElement)f.parentElement.classList.toggle('led',g>=100);}
}
function cheer(el){ if(!el)return; el.classList.remove('cheer'); void el.offsetWidth; el.classList.add('cheer'); }
// confete a partir da barra concluída
function burst(barEl){
  if(!barEl)return; const card=barEl.closest('.etapa-card')||barEl.parentElement; if(!card)return;
  const cr=card.getBoundingClientRect(), br=barEl.getBoundingClientRect();
  const ox=br.right-cr.left-14, oy=br.top-cr.top+br.height/2;
  const cols=['var(--ok)','var(--accent)','var(--blue)','#fff','#ffd479'];
  for(let i=0;i<22;i++){
    const c=document.createElement('div'); c.className='confetti';
    const ang=(-130+Math.random()*100)*Math.PI/180, dist=60+Math.random()*90;
    c.style.left=ox+'px'; c.style.top=oy+'px';
    c.style.background=cols[i%cols.length];
    c.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');
    c.style.setProperty('--dy',(Math.sin(ang)*dist+40).toFixed(0)+'px');
    c.style.setProperty('--rot',(Math.random()*720-360).toFixed(0)+'deg');
    c.style.setProperty('--dur',(750+Math.random()*450).toFixed(0)+'ms');
    if(i%2)c.style.borderRadius='50%';
    card.appendChild(c); setTimeout(()=>c.remove(),1300);
  }
}
function cronDown(ev,obraId,eid){ ev.preventDefault(); const el=ev.currentTarget; el.classList.remove('sweep'); el.classList.add('dragging'); try{el.setPointerCapture(ev.pointerId);}catch(_){} cronDragging=eid; cronApply(eid,cronPct(el,ev.clientX)); }
function cronMove(ev,obraId,eid){ if(cronDragging!==eid)return; cronApply(eid,cronPct(ev.currentTarget,ev.clientX)); }
function cronUp(ev,obraId,eid){ const el=ev.currentTarget; el.classList.remove('dragging'); if(cronDragging!==eid)return; cronDragging=null; const p=cronCtx.items[eid].p; if(p>=100){cheer(el);burst(el);} setEtapaProg(obraId,eid,p); }
function cronKey(ev,obraId,eid){
  const it=cronCtx.items[eid]; if(!it)return; let p=it.p;
  if(ev.key==='ArrowRight'||ev.key==='ArrowUp')p=Math.min(100,p+5);
  else if(ev.key==='ArrowLeft'||ev.key==='ArrowDown')p=Math.max(0,p-5);
  else if(ev.key==='Home')p=0; else if(ev.key==='End')p=100; else return;
  ev.preventDefault(); cronApply(eid,p); if(p>=100){const el=document.getElementById('pb_'+eid);cheer(el);burst(el);} setEtapaProg(obraId,eid,p);
}
// chips: animação sweep + grava
function cronChip(obraId,eid,p){
  const el=document.getElementById('pb_'+eid); if(el){el.classList.add('sweep');setTimeout(()=>el.classList.remove('sweep'),650);}
  cronApply(eid,p); if(p>=100){cheer(el);burst(el);}
  setEtapaProg(obraId,eid,p);
}
// botão Concluir: preenche a barra automaticamente (sweep) e solta confete
function cronToggleDone(obraId,eid){ const it=cronCtx.items[eid]; if(it)cronChip(obraId,eid, it.p>=100?0:100); }
// grava o progresso no Firestore
async function setEtapaProg(obraId,eid,v){
  const o=state.obras.find(x=>x.id===obraId);if(!o)return;
  const arr=(o.etapas||[]).map(e=> e.id===eid ? {...e,prog:Math.max(0,Math.min(100,Math.round(+v)))} : e);
  try{ await db.collection('obras').doc(obraId).update({etapas:arr}); }catch(e){ toast('Erro: '+e.code,'err'); }
}

function ringChart(c){

    ${profLen>1?`<circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--ok)" stroke-width="15" stroke-linecap="round"
      stroke-dasharray="${profLen.toFixed(1)} ${(C-profLen).toFixed(1)}" stroke-dashoffset="${(-costLen).toFixed(1)}" transform="rotate(-90 70 70)"/>`:''}

}

/* ---- RELATÓRIOS ---- */
function renderRel(){
  if(!isAdmin()){document.getElementById('page-rel').innerHTML=emptyHTML('Sem permissão para ver relatórios');return;}
  const rows=state.obras.map(o=>({o,c:calc(o)}));
  const tot=rows.reduce((a,{c})=>({vgv:a.vgv+c.vgv,custo:a.custo+c.custoTotal,lucro:a.lucro+c.lucro,comprom:a.comprom+c.compromissado,pago:a.pago+c.realizado}),{vgv:0,custo:0,lucro:0,comprom:0,pago:0});
  const maxVgv=Math.max(...rows.map(r=>r.c.vgv),1);
  const maxLucro=Math.max(...rows.map(r=>Math.abs(r.c.lucro)),1);
  // custo por categoria (todas as obras)
  const porCat={}; CATS.forEach(k=>porCat[k]=0);
  state.obras.forEach(o=>(o.lancamentos||[]).forEach(l=>porCat[l.categoria]=(porCat[l.categoria]||0)+(+l.valorRealizado||+l.valorPrevisto||0)));
  const catEntries=Object.entries(porCat).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const maxCat=Math.max(...catEntries.map(([,v])=>v),1);
  // custo por SUBCATEGORIA (todas as obras)
  const porSub={}; state.obras.forEach(o=>(o.lancamentos||[]).forEach(l=>{const k=(l.subcategoria||'').trim()||'(sem subcategoria)';porSub[k]=(porSub[k]||0)+(+l.valorRealizado||+l.valorPrevisto||0);}));
  const subEntries=Object.entries(porSub).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const maxSub=Math.max(...subEntries.map(([,v])=>v),1);
  // relatório por categoria selecionada (lista de lançamentos + total)
  const relLines=[]; let relTot=0;
  if(relCat){ state.obras.forEach(o=>(o.lancamentos||[]).filter(l=>l.categoria===relCat).forEach(l=>{const v=+l.valorRealizado||+l.valorPrevisto||0;relTot+=v;relLines.push({o,l,v});})); relLines.sort((a,b)=>b.v-a.v); }
  // todas as subcategorias presentes (dados ∪ cadastradas)
  const allSubsSet=new Set(listSub()); state.obras.forEach(o=>(o.lancamentos||[]).forEach(l=>{if((l.subcategoria||'').trim())allSubsSet.add(l.subcategoria.trim());}));
  const allSubs=[...allSubsSet].sort((a,b)=>a.localeCompare(b));
  // relatório por subcategoria selecionada
  const relSubLines=[]; let relSubTot=0;
  if(relSub){ state.obras.forEach(o=>(o.lancamentos||[]).filter(l=>(l.subcategoria||'')===relSub).forEach(l=>{const v=+l.valorRealizado||+l.valorPrevisto||0;relSubTot+=v;relSubLines.push({o,l,v});})); relSubLines.sort((a,b)=>b.v-a.v); }
  // status de pagamento
  let pago=0,pend=0,prev=0;
  state.obras.forEach(o=>(o.lancamentos||[]).forEach(l=>{const v=+l.valorRealizado||+l.valorPrevisto||0;const s=effStatus(l);if(s==='Pago')pago+=v;else if(s==='Pendente')pend+=v;else prev+=v;}));
  // obras por status
  const stCount={}; STATUS.forEach(s=>stCount[s[0]]=0); state.obras.forEach(o=>stCount[o.status]=(stCount[o.status]||0)+1);

  const catColors=['var(--accent)','var(--blue)','var(--ok)','var(--danger)','#9b8cff','#ff8a5c','#4dd0e1','#f06292'];
  document.getElementById('page-rel').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi accent led"><div class="klabel">VGV consolidado</div><div class="kval mono">${fmtBRL(tot.vgv)}</div><div class="ksub">${rows.length} obra(s)</div></div>
      <div class="kpi"><div class="klabel">Custo consolidado</div><div class="kval mono">${fmtBRL(tot.custo)}</div><div class="ksub">Comprometido ${fmtBRL(tot.comprom)}</div></div>
      <div class="kpi ${tot.lucro>=0?'ok':'danger'} led"><div class="klabel">Lucro consolidado</div><div class="kval mono">${fmtBRL(tot.lucro)}</div><div class="ksub">Margem ${fmtPct(tot.vgv>0?tot.lucro/tot.vgv*100:0)}</div></div>
      <div class="kpi blue"><div class="klabel">Total pago</div><div class="kval mono">${fmtBRL(tot.pago)}</div><div class="ksub">de ${fmtBRL(tot.comprom)} lançado</div></div>
    </div>

    <div class="fgrid-2" style="align-items:start">
      <div class="card"><div class="card-head"><h3>Composição do portfólio</h3></div>
        ${tot.vgv>0?ringChart({vgv:tot.vgv,custoTotal:tot.custo,lucro:tot.lucro,margem:tot.vgv>0?tot.lucro/tot.vgv*100:0}):emptyHTML('Sem dados')}
      </div>
      <div class="card"><div class="card-head"><h3>Status dos pagamentos</h3></div>
        ${(pago+pend+prev)>0?`<div style="display:flex;height:26px;border-radius:8px;overflow:hidden;margin:10px 0" class="led">
          <div style="width:${pago/(pago+pend+prev)*100}%;background:var(--ok)"></div>
          <div style="width:${pend/(pago+pend+prev)*100}%;background:var(--danger)"></div>
          <div style="width:${prev/(pago+pend+prev)*100}%;background:var(--blue)"></div></div>
          <div class="legend"><span><i class="dot" style="background:var(--ok)"></i>Pago ${fmtBRL(pago)}</span>
          <span><i class="dot" style="background:var(--danger)"></i>Pendente ${fmtBRL(pend)}</span>
          <span><i class="dot" style="background:var(--blue)"></i>Previsto ${fmtBRL(prev)}</span></div>`:emptyHTML('Sem lançamentos')}
      </div>
    </div>

    <div class="card mt">
      <div class="card-head"><h3>VGV por obra</h3><button class="btn btn-ghost btn-sm" style="width:auto" onclick="exportCSV()">Exportar CSV</button></div>
      ${rows.length?`<div class="bar-chart" style="height:210px">${rows.map(({o,c})=>`
        <div class="bar" title="${esc(o.nome)}: ${fmtBRL(c.vgv)}"><b class="mono" style="font-size:10px">${fmtBRL(c.vgv)}</b><div class="fill" style="height:${c.vgv/maxVgv*100}%"></div>
        <small>${esc(o.nome.slice(0,12))}</small></div>`).join('')}</div>`:emptyHTML('Sem dados')}
    </div>

    <div class="fgrid-2 mt" style="align-items:start">
      <div class="card"><div class="card-head"><h3>Lucro previsto por obra</h3></div>
        ${rows.length?`<div class="bar-chart" style="height:190px">${rows.map(({o,c})=>`
          <div class="bar" title="${esc(o.nome)}: ${fmtBRL(c.lucro)}"><b class="mono" style="font-size:10px" class="${c.lucro>=0?'pos':'neg'}">${fmtBRL(c.lucro)}</b>
          <div class="fill" style="height:${Math.abs(c.lucro)/maxLucro*100}%;background:${c.lucro>=0?'linear-gradient(180deg,var(--ok),#1d9e6b)':'linear-gradient(180deg,var(--danger),#b3322f)'};box-shadow:0 0 16px -4px ${c.lucro>=0?'var(--ok)':'var(--danger)'}"></div>
          <small>${esc(o.nome.slice(0,10))}</small></div>`).join('')}</div>`:emptyHTML('Sem dados')}
      </div>
      <div class="card"><div class="card-head"><h3>Custo por categoria</h3></div>
        ${catEntries.length?catEntries.map(([k,v],i)=>`
          <div style="margin-bottom:11px"><div class="flex between" style="font-size:12.5px;margin-bottom:5px"><span>${esc(k)}</span><b class="mono">${fmtBRL(v)}</b></div>
          <div class="progress led"><i style="width:${v/maxCat*100}%;background:${catColors[i%catColors.length]};box-shadow:0 0 12px -2px ${catColors[i%catColors.length]}"></i></div></div>`).join(''):emptyHTML('Sem lançamentos')}
      </div>
    </div>

    <div class="card mt"><div class="card-head"><h3>Relatório por categoria</h3>
      <select class="input" style="width:auto;min-width:210px" onchange="setRelCat(this.value)">
        <option value="">— selecione a categoria —</option>
        ${listCats().map(k=>`<option ${k===relCat?'selected':''}>${esc(k)}</option>`).join('')}
      </select></div>
      ${relCat?`
        <div class="flex between wrap" style="gap:10px;margin:6px 0 14px">
          <div class="muted">Total gasto em <b style="color:var(--text)">${esc(relCat)}</b> · ${relLines.length} lançamento(s)</div>
          <div class="mono" style="font-size:23px;font-weight:800;color:var(--accent)">${fmtBRL(relTot)}</div>
        </div>
        ${relLines.length?`<div style="overflow-x:auto"><table><thead><tr><th>Obra</th><th>Descrição</th><th>Subcategoria</th><th>Data</th><th>Status</th><th class="td-r">Valor</th></tr></thead><tbody>
          ${relLines.map(({o,l,v})=>{const ps=PAGSTATUS.find(p=>p[0]===effStatus(l))||PAGSTATUS[0];
            return `<tr onclick="openObra('${o.id}')" style="cursor:pointer"><td><b>${esc(o.nome)}</b></td><td>${esc(l.descricao)}${funcTag(l)}</td>
            <td class="muted">${esc(l.subcategoria||'—')}</td><td class="muted">${dateBR(l.data)}</td>
            <td><span class="badge ${ps[1]}">${ps[0]}</span></td><td class="td-r mono">${fmtBRL2(v)}</td></tr>`;}).join('')}
          </tbody></table></div>`:emptyHTML('Nenhum lançamento nesta categoria')}
      `:`<p class="muted">Escolha uma categoria acima para ver o total gasto e todos os lançamentos dela (material, empreita, etc.).</p>`}
    </div>

    <div class="card mt"><div class="card-head"><h3>Custo por subcategoria</h3></div>
      ${subEntries.length?subEntries.map(([k,v],i)=>`
        <div style="margin-bottom:11px"><div class="flex between" style="font-size:12.5px;margin-bottom:5px"><span>${esc(k)}</span><b class="mono">${fmtBRL(v)}</b></div>
        <div class="progress led"><i style="width:${v/maxSub*100}%;background:${catColors[i%catColors.length]};box-shadow:0 0 12px -2px ${catColors[i%catColors.length]}"></i></div></div>`).join(''):emptyHTML('Cadastre subcategorias nos lançamentos para ver este controle')}
    </div>

    <div class="card mt"><div class="card-head"><h3>Relatório por subcategoria</h3>
      <select class="input" style="width:auto;min-width:210px" onchange="setRelSub(this.value)">
        <option value="">— selecione a subcategoria —</option>
        ${allSubs.map(k=>`<option ${k===relSub?'selected':''}>${esc(k)}</option>`).join('')}
      </select></div>
      ${relSub?`
        <div class="flex between wrap" style="gap:10px;margin:6px 0 14px">
          <div class="muted">Total gasto em <b style="color:var(--text)">${esc(relSub)}</b> · ${relSubLines.length} lançamento(s)</div>
          <div class="mono" style="font-size:23px;font-weight:800;color:var(--accent)">${fmtBRL(relSubTot)}</div>
        </div>
        ${relSubLines.length?`<div style="overflow-x:auto"><table><thead><tr><th>Obra</th><th>Descrição</th><th>Categoria</th><th>Data</th><th>Status</th><th class="td-r">Valor</th></tr></thead><tbody>
          ${relSubLines.map(({o,l,v})=>{const ps=PAGSTATUS.find(p=>p[0]===effStatus(l))||PAGSTATUS[0];
            return `<tr onclick="openObra('${o.id}')" style="cursor:pointer"><td><b>${esc(o.nome)}</b></td><td>${esc(l.descricao)}${funcTag(l)}</td>
            <td class="muted">${esc(l.categoria||'—')}</td><td class="muted">${dateBR(l.data)}</td>
            <td><span class="badge ${ps[1]}">${ps[0]}</span></td><td class="td-r mono">${fmtBRL2(v)}</td></tr>`;}).join('')}
          </tbody></table></div>`:emptyHTML('Nenhum lançamento nesta subcategoria')}
      `:`<p class="muted">Escolha uma subcategoria acima para ver o total gasto e todos os lançamentos dela (concreto, empreita, ferro/aço, etc.).</p>`}
    </div>

    <div class="card mt"><div class="card-head"><h3>Obras por status</h3></div>
      <div class="kpi-grid" style="margin-bottom:0">${STATUS.map(s=>`
        <div class="kpi"><div class="klabel">${s[0]}</div><div class="kval mono">${stCount[s[0]]||0}</div></div>`).join('')}</div>
    </div>

    <div class="card mt">
      <div class="card-head"><h3>Quadro de resultados</h3></div>
      <div style="overflow-x:auto"><table><thead><tr>
        <th>Obra</th><th>Status</th><th class="td-r">VGV</th><th class="td-r">Custo total</th><th class="td-r">Lucro</th><th class="td-r">Margem</th><th class="td-r">ROI</th></tr></thead><tbody>
        ${rows.map(({o,c})=>`<tr onclick="openObra('${o.id}')" style="cursor:pointer"><td><b>${esc(o.nome)}</b></td><td>${esc(o.status)}</td>
          <td class="td-r">${fmtBRL(c.vgv)}</td><td class="td-r">${fmtBRL(c.custoTotal)}</td>
          <td class="td-r ${c.lucro>=0?'pos':'neg'}">${fmtBRL(c.lucro)}</td><td class="td-r ${c.margem>=0?'pos':'neg'}">${fmtPct(c.margem)}</td>
          <td class="td-r">${fmtPct(c.roi)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
}
function exportCSV(){
  const head=['Obra','Codigo','Tipo','Status','Cidade','Area construida','Area vendavel','VGV','Custo total','Lucro','Margem %','ROI %'];
  const lines=state.obras.map(o=>{const c=calc(o);return [o.nome,o.codigo,o.tipo,o.status,o.cidade,o.areaConstruida,o.areaVendavel,
    Math.round(c.vgv),Math.round(c.custoTotal),Math.round(c.lucro),c.margem.toFixed(1),c.roi.toFixed(1)]
    .map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(';');});
  const csv=[head.join(';'),...lines].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));
  a.download='davincit_relatorio.csv';a.click();toast('CSV exportado','ok');
}

/* =================== MODALS / CRUD =================== */
function field(lbl,id,val='',type='text',ph='',sfx=''){
  const money = sfx==='R$' ? ' money' : '';
  return `<div class="field"><label>${lbl}</label>${sfx?`<div class="input-suffix">`:''}
    <input class="input${money}" id="${id}" type="${type}" value="${esc(val)}" placeholder="${ph}" ${type==='text'&&sfx?'inputmode="decimal"':''}>
    ${sfx?`<span class="sfx">${sfx}</span></div>`:''}</div>`;
}
function sel(lbl,id,opts,val){return `<div class="field"><label>${lbl}</label><select class="input" id="${id}">
  ${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;}
// select extensível: com botão "+" para admin adicionar opções (kind: 'tipo' | 'categoria')
function selExt(lbl,id,opts,val,kind,onchange){
  const add = (isAdmin()&&kind) ? `<button type="button" class="btn-icon" title="Adicionar opção" onclick="openAddOpt('${kind}','${id}')" style="flex:0 0 38px">+</button>` : '';
  return `<div class="field"><label>${lbl}</label>
    <div class="flex" style="gap:8px;align-items:stretch">
      <select class="input" id="${id}" ${onchange?`onchange="${onchange}"`:''} style="flex:1">${opts.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select>
      ${add}</div></div>`;
}
// select de funcionário (valor = id), com "+" para admin
function selFunc(id,val,obraId){
  const o=state.obras.find(x=>x.id===obraId); const fs=(o&&o.funcionarios)||[];
  const opts=`<option value="">— selecione o funcionário/empresa —</option>`+fs.map(f=>`<option value="${f.id}" ${f.id===val?'selected':''}>${esc(f.nome)}${f.funcao?' — '+esc(f.funcao):''}</option>`).join('');
  const add = `<button type="button" class="btn-icon" title="Adicionar funcionário/empresa" onclick="openAddOpt('funcionario','${id}','${obraId}')" style="flex:0 0 38px">+</button>`;
  return `<div class="field"><label>Funcionário / Empresa</label>
    <div class="flex" style="gap:8px;align-items:stretch">
      <select class="input" id="${id}" style="flex:1">${opts}</select>${add}</div></div>`;
}
// mini-prompt sobreposto (fica acima do modal aberto, sem perder o formulário)
// funcionário é POR OBRA (atrelado à obra; não aparece em outras)
function openAddOpt(kind,selectId,obraId){
  const isFunc=kind==='funcionario';
  const titulo=isFunc?'Novo funcionário / empresa':(kind==='tipo'?'Novo tipo de obra':(kind==='subcategoria'?'Nova subcategoria':(kind==='forma'?'Nova forma de pagamento':'Nova categoria')));
  const body=isFunc
    ? `<div class="field"><label>Nome</label><input class="input" id="mp_nome" placeholder="Ex: João Silva"></div>
       <div class="field"><label>Função</label><input class="input" id="mp_funcao" placeholder="Ex: Eletricista"></div>
       <div class="field"><label>Saldo da empreita (valor contratado)</label><div class="input-suffix"><input class="input money" id="mp_saldo" inputmode="decimal" placeholder="0,00"><span class="sfx">R$</span></div></div>
       <div class="field"><label>Avisar quando o saldo restante for ≤</label><div class="input-suffix"><input class="input money" id="mp_alerta" inputmode="decimal" value="30.000" placeholder="0,00"><span class="sfx">R$</span></div><p class="hint">Recomendado: 30.000. Deixe em branco/0 para não receber alerta.</p></div>`
    : `<div class="field"><label>Nome</label><input class="input" id="mp_val" placeholder="Digite e confirme"></div>`;
  const host=document.createElement('div');
  host.className='overlay open'; host.style.zIndex='130';
  host.innerHTML=`<div class="modal" style="max-width:440px"><div class="modal-head"><h3>${titulo}</h3>
    <button class="btn-icon" onclick="this.closest('.overlay').remove()">✕</button></div>
    <div class="modal-body">${body}<div class="auth-err" id="mp_err" style="margin-top:6px"></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px" id="mp_ok">Adicionar</button></div></div>`;
  document.body.appendChild(host);
  applyMoney(host);
  host.querySelector('#mp_ok').onclick=async()=>{
    const err=host.querySelector('#mp_err'); err.textContent='';
    try{
      if(isFunc){
        const nome=host.querySelector('#mp_nome').value.trim(), funcao=host.querySelector('#mp_funcao').value.trim();
        const saldo=num(host.querySelector('#mp_saldo').value);
        const alerta=num(host.querySelector('#mp_alerta').value);
        if(!nome){err.textContent='Informe o nome.';return;}
        if(!obraId){err.textContent='Funcionário precisa estar vinculado a uma obra.';return;}
        const f={id:uid(),nome,funcao,saldoEmpreita:saldo,alertaEmpreita:alerta};
        const o=state.obras.find(x=>x.id===obraId); const arr=[...((o&&o.funcionarios)||[]),f];
        await db.collection('obras').doc(obraId).update({funcionarios:arr});
        if(selectId){const s=document.getElementById(selectId);const op=document.createElement('option');op.value=f.id;op.textContent=nome+(funcao?' — '+funcao:'');op.selected=true;s.appendChild(op);}
      }else{
        const v=host.querySelector('#mp_val').value.trim();
        if(!v){err.textContent='Informe o nome.';return;}
        const field=kind==='tipo'?'tipos':(kind==='subcategoria'?'subcategorias':(kind==='forma'?'formas':'categorias'));
        await db.collection('meta').doc('lists').set({[field]:firebase.firestore.FieldValue.arrayUnion(v)},{merge:true});
        if(selectId){const s=document.getElementById(selectId);
          if(![...s.options].some(op=>op.value===v)){const op=document.createElement('option');op.value=v;op.textContent=v;s.appendChild(op);}
          s.value=v; if(s.getAttribute('onchange'))s.dispatchEvent(new Event('change'));}
      }
      toast('Adicionado','ok'); host.remove();
    }catch(e){ err.textContent='Erro: '+e.code; }
  };
  setTimeout(()=>{const f=host.querySelector('input');if(f)f.focus();},50);
}
function removeFuncionario(obraId,fid){
  const o=state.obras.find(x=>x.id===obraId); const f=((o&&o.funcionarios)||[]).find(x=>x.id===fid);
  confirmModal('Remover funcionário?',`<b>${esc(f?f.nome:'')}</b> sairá desta obra (lançamentos já feitos são mantidos).`,async()=>{
    const arr=((o&&o.funcionarios)||[]).filter(x=>x.id!==fid);
    try{ await db.collection('obras').doc(obraId).update({funcionarios:arr}); toast('Removido','ok'); }
    catch(e){ toast('Erro: '+e.code,'err'); }
  });
}

function editFuncionario(obraId,fid){

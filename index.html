<style>
:root{
  --bg:#0B0E13; --surface:#13181F; --surface2:#1A212A; --surface3:#232C36;
  --border:#262E39; --border2:#37434F;
  --text:#EAEEF4; --muted:#8B97A6; --faint:#586472;
  --accent:#FFB02E; --accent-d:#E0941A; --accent-soft:rgba(255,176,46,.12);
  --blue:#56A8E6; --blueprint:#15334C;
  --ok:#2FCD8E; --okbg:#0F3328; --danger:#FF5D62; --dangerbg:#371A1C; --warn:#FFB02E; --warnbg:#382B11;
  --shadow:0 18px 50px -12px rgba(0,0,0,.6); --shadow-s:0 4px 14px rgba(0,0,0,.34);
  --glow:0 0 0 1px rgba(255,176,46,.25),0 8px 30px -6px rgba(255,176,46,.25);
  --rad:16px; --rad-s:11px; --rad-xs:8px;
  --display:'Archivo',sans-serif; --body:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
  --grid-line:rgba(86,168,230,.045);
}
[data-theme="light"]{
  --bg:#EBEEF3; --surface:#FFFFFF; --surface2:#F4F7FA; --surface3:#E9EEF4;
  --border:#E1E7EF; --border2:#CDD7E2;
  --text:#141B26; --muted:#5A6678; --faint:#94A0AF;
  --accent:#E59100; --accent-d:#C97D00; --accent-soft:rgba(229,145,0,.12);
  --blue:#2E7FC4; --blueprint:#DCEAF6;
  --okbg:#E2F6EE; --dangerbg:#FCE7E7; --warnbg:#FDF3DC;
  --shadow:0 18px 50px -16px rgba(40,55,80,.22); --shadow-s:0 4px 14px rgba(40,55,80,.09);
  --glow:0 0 0 1px rgba(229,145,0,.28),0 8px 26px -8px rgba(229,145,0,.3);
  --grid-line:rgba(46,127,196,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
h1,h2,h3,h4{font-family:var(--display);font-weight:800;letter-spacing:-.025em;line-height:1.12}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--body);font-size:14px}
a{color:var(--blue);text-decoration:none}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
::selection{background:var(--accent-soft);color:var(--text)}

/* ---------- AUTH ---------- */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;
  background:
    radial-gradient(1100px 620px at 78% -12%, rgba(255,176,46,.14), transparent 60%),
    radial-gradient(900px 600px at 12% 110%, rgba(86,168,230,.10), transparent 55%),
    linear-gradient(180deg,color-mix(in srgb,var(--bg) 92%,#000),var(--bg));}
.auth-wrap::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:42px 42px;mask-image:radial-gradient(circle at 50% 40%,#000 30%,transparent 78%);pointer-events:none}
.auth-card{width:100%;max-width:430px;position:relative;background:linear-gradient(165deg,color-mix(in srgb,var(--surface) 96%,#fff 4%),var(--surface));
  border:1px solid var(--border2);border-radius:22px;padding:42px 38px;box-shadow:var(--shadow);
  animation:rise .6s cubic-bezier(.16,.84,.3,1)}
.auth-card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
@keyframes rise{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:8px}
.brand .logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(140deg,var(--accent),var(--accent-d));
  display:grid;place-items:center;color:#1A1206;font-weight:900;font-family:var(--display);font-size:23px;
  box-shadow:0 6px 18px -4px rgba(255,176,46,.5),inset 0 1px 0 rgba(255,255,255,.4)}
.brand .name{font-family:var(--display);font-weight:900;font-size:24px;letter-spacing:-.04em}
.brand .name span{color:var(--accent)}
.auth-sub{color:var(--muted);font-size:13.5px;margin:16px 0 28px;line-height:1.6}
.field{margin-bottom:17px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rad-s);
  padding:12px 14px;color:var(--text);transition:border-color .16s,box-shadow .16s,background .16s;outline:none}
.input::placeholder{color:var(--faint)}
.input:hover{border-color:var(--border2)}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3.5px var(--accent-soft);background:var(--surface)}
select.input{cursor:pointer}
textarea.input{resize:vertical;min-height:78px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:var(--rad-s);
  font-weight:700;font-size:14px;transition:transform .14s cubic-bezier(.2,.8,.2,1),filter .14s,box-shadow .14s,background .14s,border-color .14s;
  white-space:nowrap;letter-spacing:-.01em}
.btn:active{transform:translateY(0) scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#1A1206;width:100%;
  box-shadow:0 6px 18px -6px rgba(255,176,46,.55),inset 0 1px 0 rgba(255,255,255,.35)}
.btn-primary:hover{filter:brightness(1.07);transform:translateY(-1.5px);box-shadow:0 12px 26px -8px rgba(255,176,46,.6),inset 0 1px 0 rgba(255,255,255,.35)}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--border2);background:var(--surface3);transform:translateY(-1px)}
.btn-sm{padding:8px 13px;font-size:13px}
.btn-icon{width:38px;height:38px;padding:0;border-radius:var(--rad-s);background:var(--surface2);border:1px solid var(--border);
  display:grid;place-items:center;transition:.14s;color:var(--muted)}
.btn-icon:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
.auth-err{color:var(--danger);font-size:13px;margin-top:-2px;margin-bottom:12px;min-height:18px;font-weight:600}
.auth-foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:22px;letter-spacing:.02em}

/* ---------- APP SHELL ---------- */
#app{display:none}
.shell{display:flex;min-height:100vh;position:relative}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(circle at 70% 0%,#000,transparent 70%)}
.sidebar{width:252px;background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 97%,#fff 3%),var(--surface));
  border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;
  transition:width .24s cubic-bezier(.2,.8,.2,1)}
.sidebar.collapsed{width:72px}
.sb-head{padding:0 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);height:66px;flex:0 0 66px}
.sb-head .logo{width:38px;height:38px;flex:0 0 38px;border-radius:11px;background:linear-gradient(140deg,var(--accent),var(--accent-d));
  display:grid;place-items:center;color:#1A1206;font-weight:900;font-family:var(--display);font-size:19px;
  box-shadow:0 4px 12px -3px rgba(255,176,46,.5),inset 0 1px 0 rgba(255,255,255,.4)}
.sb-head .name{font-family:var(--display);font-weight:900;font-size:19px;letter-spacing:-.04em;white-space:nowrap}
.sb-head .name span{color:var(--accent)}
.collapsed .sb-head .name{display:none}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--rad-s);color:var(--muted);
  font-weight:600;font-size:14px;cursor:pointer;transition:.14s;margin-bottom:4px;position:relative;white-space:nowrap}
.nav-item svg{flex:0 0 20px;transition:.14s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item:hover svg{transform:scale(1.08)}
.nav-item.active{background:linear-gradient(100deg,var(--accent-soft),transparent);color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;
  background:var(--accent);box-shadow:0 0 12px var(--accent)}
.collapsed .nav-item .lbl{display:none}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:11px;font-weight:800;
  min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px;box-shadow:0 2px 8px -1px var(--danger)}
.collapsed .nav-badge{position:absolute;top:5px;right:5px;margin:0}
.sb-foot{padding:13px 12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--rad-s);background:var(--surface2);border:1px solid var(--border)}
.avatar{width:33px;height:33px;flex:0 0 33px;border-radius:10px;background:linear-gradient(140deg,var(--blueprint),var(--surface3));
  color:var(--blue);display:grid;place-items:center;font-weight:800;font-size:14px;font-family:var(--display);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.user-pill .meta{overflow:hidden;line-height:1.3}
.user-pill .meta b{font-size:13px;display:block;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
.user-pill .meta small{color:var(--faint);font-size:11px}
.collapsed .user-pill .meta{display:none}

.main{flex:1;margin-left:252px;transition:margin .24s cubic-bezier(.2,.8,.2,1);min-width:0;position:relative;z-index:1}
.main.wide{margin-left:72px}
.topbar{height:66px;border-bottom:1px solid var(--border);
  background:color-mix(in srgb,var(--surface) 72%,transparent);backdrop-filter:blur(16px) saturate(1.4);
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:13px;padding:0 26px}
.topbar h1{font-size:21px;letter-spacing:-.03em}
.topbar .spacer{flex:1}
.content{padding:28px 32px 70px;position:relative}
.page{display:none}
.page.active{display:block;animation:fade .42s cubic-bezier(.16,.84,.3,1)}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.page.active > *{animation:fade .5s cubic-bezier(.16,.84,.3,1) backwards}
.page.active > *:nth-child(2){animation-delay:.05s}
.page.active > *:nth-child(3){animation-delay:.1s}
.page.active > *:nth-child(4){animation-delay:.15s}

/* ---------- KPI ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(218px,1fr));gap:16px;margin-bottom:26px}
.kpi{background:linear-gradient(165deg,color-mix(in srgb,var(--surface) 94%,#fff 6%),var(--surface));
  border:1px solid var(--border);border-radius:var(--rad);padding:19px 21px;position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.2,.8,.2,1),border-color .2s,box-shadow .2s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border2);opacity:.7}
.kpi:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--shadow-s)}
.kpi::after{content:'';position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle,currentColor,transparent 70%);opacity:.06}
.kpi .klabel{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.kpi .kval{font-family:var(--display);font-weight:800;font-size:28px;margin-top:10px;letter-spacing:-.03em}
.kpi .ksub{font-size:12px;color:var(--faint);margin-top:5px}
.kpi.accent{color:var(--accent)} .kpi.accent::before{background:linear-gradient(90deg,var(--accent),transparent)} .kpi.accent .kval{color:var(--accent)}
.kpi.ok{color:var(--ok)} .kpi.ok::before{background:linear-gradient(90deg,var(--ok),transparent)} .kpi.ok .kval{color:var(--ok)}
.kpi.danger{color:var(--danger)} .kpi.danger::before{background:linear-gradient(90deg,var(--danger),transparent)} .kpi.danger .kval{color:var(--danger)}
.kpi.blue{color:var(--blue)} .kpi.blue::before{background:linear-gradient(90deg,var(--blue),transparent)} .kpi.blue .kval{color:var(--blue)}
.kpi.warn{color:var(--warn)} .kpi.warn::before{background:linear-gradient(90deg,var(--warn),transparent)} .kpi.warn .kval{color:var(--warn)}

/* ---------- CARDS ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:23px;
  box-shadow:0 1px 0 rgba(255,255,255,.02) inset;transition:border-color .2s}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:19px;gap:12px;flex-wrap:wrap}
.card-head h3{font-size:17px;letter-spacing:-.02em}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;
  font-family:var(--body);margin:28px 0 15px;display:flex;align-items:center;gap:11px}
.section-title::before{content:'';width:16px;height:2.5px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px var(--accent)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
.toolbar .grow{flex:1;min-width:160px}
.search{position:relative;flex:1;min-width:210px}
.search input{width:100%;padding-left:40px}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint)}
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:22px;background:var(--surface2);border:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.chip.active{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#1A1206;border-color:transparent;
  box-shadow:0 4px 12px -4px rgba(255,176,46,.5)}

/* ---------- OBRA CARDS ---------- */
.obra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(326px,1fr));gap:18px}
.obra-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;
  cursor:pointer;transition:transform .22s cubic-bezier(.2,.8,.2,1),border-color .22s,box-shadow .22s;position:relative}
.obra-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:var(--shadow)}
.obra-card .top{height:74px;position:relative;display:flex;align-items:flex-end;justify-content:space-between;padding:13px 16px;
  background:linear-gradient(120deg,var(--blueprint),color-mix(in srgb,var(--surface3) 80%,var(--blueprint)));
  background-image:repeating-linear-gradient(46deg,rgba(86,168,230,.10) 0,rgba(86,168,230,.10) 1px,transparent 1px,transparent 13px)}
.obra-card .top::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.12))}
.obra-card .code{position:relative;z-index:1;font-family:var(--mono);font-size:11px;color:var(--muted);
  background:color-mix(in srgb,var(--surface) 85%,transparent);padding:3px 9px;border-radius:7px;border:1px solid var(--border)}
.obra-card .body{padding:17px}
.obra-card h4{font-size:17.5px;margin-bottom:4px;letter-spacing:-.02em}
.obra-card .loc{font-size:12.5px;color:var(--muted);margin-bottom:15px;display:flex;align-items:center;gap:6px}
.obra-card .metrics{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.obra-card .metric small{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px}
.obra-card .metric b{font-family:var(--mono);font-size:15px;font-weight:700}
.alert-dot{position:absolute;top:11px;left:13px;z-index:2;width:23px;height:23px;border-radius:50%;background:var(--danger);
  color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px;box-shadow:0 0 0 4px var(--dangerbg);animation:pulse 1.9s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,93,98,.55)}50%{box-shadow:0 0 0 8px rgba(255,93,98,0)}}

/* ---------- BADGES ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:8px;letter-spacing:.01em;
  border:1px solid transparent}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.b-plan{background:var(--blueprint);color:var(--blue)} .b-and{background:var(--warnbg);color:var(--warn)}
.b-pausa{background:var(--surface3);color:var(--muted)} .b-conc{background:var(--okbg);color:var(--ok)}
.b-pago{background:var(--okbg);color:var(--ok)} .b-prev{background:var(--blueprint);color:var(--blue)} .b-pend{background:var(--warnbg);color:var(--warn)}

/* ---------- TABLES ---------- */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
  font-weight:700;padding:11px 13px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:13px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--surface2)}
.td-r{text-align:right;font-family:var(--mono)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;color:var(--muted);transition:.13s;border:1px solid transparent}
.icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border)}
.icon-btn.del:hover{color:var(--danger);background:var(--dangerbg);border-color:transparent}

/* ---------- PROGRESS / GAUGE ---------- */
.progress{height:9px;background:var(--surface3);border-radius:6px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.2)}
.progress > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent-d),var(--accent));
  transition:width .6s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 10px -1px var(--accent)}
.progress.over > i{background:linear-gradient(90deg,#b3322f,var(--danger));box-shadow:0 0 10px -1px var(--danger)}
.gauge{margin:15px 0;height:11px;border-radius:7px;background:var(--surface3);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.2)}
.gauge > i{display:block;height:100%;border-radius:7px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

.empty{text-align:center;padding:64px 20px;color:var(--faint)}
.empty svg{opacity:.35;margin-bottom:16px}
.empty p{font-size:15px;margin-bottom:20px}
.empty p b{color:var(--muted)}

/* ---------- TABS ---------- */
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.tab{padding:12px 17px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:.14s;font-size:14px;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ---------- FORMS ---------- */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:15px}
.fgrid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.input-suffix{position:relative}

/* ---------- VIABILITY ---------- */

    radial-gradient(600px 300px at 100% 0%,var(--accent-soft),transparent 60%),
    linear-gradient(165deg,var(--surface3),var(--surface));
  border:1px solid var(--border2);border-radius:var(--rad);padding:26px;position:sticky;top:88px;box-shadow:var(--shadow-s);overflow:hidden}

.result-line:last-child{border-bottom:none}

.result-line .num{font-family:var(--mono);font-weight:700;font-size:16px}
.result-hero{text-align:center;padding:18px 0 12px}

.result-hero .big{font-family:var(--display);font-weight:900;font-size:40px;letter-spacing:-.04em;margin-top:5px;line-height:1}
.pos{color:var(--ok)} .neg{color:var(--danger)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(7,10,14,.72);backdrop-filter:blur(5px);z-index:90;
  display:none;align-items:flex-start;justify-content:center;padding:44px 16px;overflow-y:auto}
.overlay.open{display:flex;animation:fade .2s}
.modal{width:100%;max-width:680px;background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 96%,#fff 4%),var(--surface));
  border:1px solid var(--border2);border-radius:18px;box-shadow:var(--shadow);animation:modalIn .32s cubic-bezier(.16,.84,.3,1);margin:auto 0}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.modal.lg{max-width:900px}
.modal-head{padding:20px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:18px}
.modal-body{padding:26px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:17px 26px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* ---------- TOAST ---------- */
.toast-wrap{position:fixed;bottom:26px;right:26px;z-index:120;display:flex;flex-direction:column;gap:10px}
.toast{background:color-mix(in srgb,var(--surface3) 92%,transparent);backdrop-filter:blur(10px);
  border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:12px;padding:13px 18px;
  box-shadow:var(--shadow);font-weight:600;font-size:13.5px;animation:toastIn .3s cubic-bezier(.16,.84,.3,1);max-width:340px}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--danger)}

/* ---------- MISC ---------- */
.divider{height:1px;background:var(--border);margin:23px 0}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.flex{display:flex;align-items:center;gap:10px} .between{justify-content:space-between} .wrap{flex-wrap:wrap}
.mt{margin-top:14px} .mt-l{margin-top:26px} .mb{margin-bottom:14px}
.hint{font-size:12px;color:var(--faint);margin-top:6px;line-height:1.6}

.bar-chart{display:flex;align-items:flex-end;gap:11px;height:180px;padding-top:10px}
.bar-chart .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bar-chart .bar .fill{width:100%;max-width:48px;border-radius:8px 8px 3px 3px;
  background:linear-gradient(180deg,var(--accent),var(--accent-d));transition:height .7s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 0 16px -4px var(--accent),inset 0 1px 0 rgba(255,255,255,.25);position:relative}

<script>
/* ============================================================
   ObraViva — gestão de obras civis (local-first, single file)
   ============================================================ */
const THEMEKEY='obraviva_theme';
const ICONS={
  dash:'<path d="M3 13h8V3H3zM13 21h8V8h-8zM13 3v3h8V3zM3 17v4h8v-4z"/>',
  obras:'<path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M9 13h.01M9 17h.01M15 9h.01M15 13h.01M15 17h.01"/>',
  custos:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  viab:'<path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  rel:'<path d="M3 3v18h18M7 14l4-4 3 3 5-6"/>',
  config:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.83 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9.4l.33-.33a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 12 4.6V4.5a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 2.83 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 8.6V8.5a2 2 0 0 1 0 4h-.09z"/>'
};
const NAV=[
  {id:'dash',label:'Painel',title:'Painel'},
  {id:'obras',label:'Obras',title:'Obras'},
  {id:'custos',label:'Custos & Lançamentos',title:'Custos & Lançamentos'},
  {id:'viab',label:'Viabilidade · VGV',title:'Estudo de Viabilidade'},
  {id:'rel',label:'Relatórios',title:'Relatórios'},
  {id:'config',label:'Configurações',title:'Configurações',admin:true},
];
const TIPOS=['Residencial','Comercial','Incorporação','Reforma','Infraestrutura'];
const STATUS=[['Planejamento','b-plan'],['Em andamento','b-and'],['Pausada','b-pausa'],['Concluída','b-conc']];
const CATS=['Material','Mão de obra','Empreita','Equipamento','Serviço','Taxas / Licenças','Administrativo','Outro'];
const PAGSTATUS=[['Previsto','b-prev'],['Pendente','b-pend'],['Pago','b-pago']];
// Qualificação (padrão construtivo) -> fração de mão de obra e alíquota de ISS aproximadas
const QUALIF=['Popular','Normal','Médio','Alto padrão','Luxo'];
const QUALIF_FATOR={
  'Popular':{mo:0.42,iss:0.025}, 'Normal':{mo:0.37,iss:0.03}, 'Médio':{mo:0.33,iss:0.03},
  'Alto padrão':{mo:0.30,iss:0.035}, 'Luxo':{mo:0.27,iss:0.04}
};
const INSS_OBRA=0.20;       // contribuição previdenciária aproximada na aferição (CNO)
const CART_PCT=0.006;       // emolumentos de averbação da construção (~0,6% do valor da obra)
const CART_UNID=900;        // custa fixa aproximada por unidade (individualização/averbação)
const OUTRAS_PCT=0.002;     // taxas de habite-se, CND, baixa do RET/afetação (~0,2%)

let state={users:[],obras:[],lists:{tipos:[],categorias:[],funcionarios:[]},theme:'dark'}, session=null, currentObra=null, currentTab='visao';
let unsubObras=null, unsubUsers=null, unsubSelf=null, unsubMeta=null;
// listas efetivas (padrão + personalizadas salvas no Firestore)
function listTipos(){ return [...TIPOS, ...((state.lists.tipos||[]).filter(t=>!TIPOS.includes(t)))]; }
function listCats(){ return [...CATS, ...((state.lists.categorias||[]).filter(c=>!CATS.includes(c)))]; }
function listFuncs(){ return (state.lists.funcionarios||[]); }
function funcNome(id){ const f=listFuncs().find(x=>x.id===id); return f?`${f.nome}${f.funcao?' — '+f.funcao:''}`:''; }
const funcTag=l=>l.funcionarioNome?` <span class="badge b-prev" style="font-size:10px;padding:2px 7px;vertical-align:middle">${esc(l.funcionarioNome)}</span>`:'';

/* ---------- persistence (Firestore) ---------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function loadTheme(){ state.theme=localStorage.getItem(THEMEKEY)||'dark';
  document.documentElement.setAttribute('data-theme',state.theme); }
// re-renderiza a página ativa quando os dados do Firestore mudam
function refreshActive(){
  const active=document.querySelector('.page.active'); if(!active)return;
  const id=active.id.replace('page-','');
  ({dash:renderDash,obras:renderObras,obra:renderObra,custos:renderCustos,viab:renderViab,rel:renderRel,config:renderConfig}[id]||renderDash)();
  refreshAlertBadge();
}
// assina obras e usuários em tempo real
function attachListeners(){
  detachListeners();
  unsubObras=db.collection('obras').onSnapshot(snap=>{
    state.obras=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentObra){const f=state.obras.find(o=>o.id===currentObra.id); currentObra=f||null;}
    refreshActive();
  },err=>toast('Erro ao carregar obras: '+err.code,'err'));
  if(isAdmin()){
    unsubUsers=db.collection('users').onSnapshot(snap=>{
      state.users=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(document.getElementById('page-config').classList.contains('active'))renderConfig();
    },err=>{});
  }
  unsubMeta=db.collection('meta').doc('lists').onSnapshot(d=>{
    state.lists = d.exists ? {tipos:[],categorias:[],funcionarios:[],...d.data()} : {tipos:[],categorias:[],funcionarios:[]};
    if(document.getElementById('page-config').classList.contains('active'))renderConfig();
  },err=>{});
}
function detachListeners(){ if(unsubObras)unsubObras(); if(unsubUsers)unsubUsers(); if(unsubMeta)unsubMeta();
  unsubObras=unsubUsers=unsubMeta=null; }

/* ---------- formatters ---------- */
const fmtBRL=n=>isFinite(n)?n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}):'—';
const fmtBRL2=n=>isFinite(n)?n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):'—';
const fmtNum=n=>isFinite(n)?n.toLocaleString('pt-BR',{maximumFractionDigits:2}):'—';
const fmtPct=n=>isFinite(n)?n.toLocaleString('pt-BR',{maximumFractionDigits:1})+'%':'—';
const fmtArea=n=>isFinite(n)?n.toLocaleString('pt-BR',{maximumFractionDigits:0})+' m²':'—';
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=v=>{const n=parseFloat(String(v).replace(/\./g,'').replace(',','.'));return isFinite(n)?n:0;};
const dateBR=d=>d?new Date(d+'T00:00').toLocaleDateString('pt-BR'):'—';
// soma N meses a uma data (trata overflow de dias, ex: 31/01 + 1 mês = 28/02)
function addMonths(dateStr,months){
  if(!dateStr||!(months>0))return '';
  const d=new Date(dateStr+'T00:00'),day=d.getDate();
  d.setMonth(d.getMonth()+Math.round(months));
  if(d.getDate()<day)d.setDate(0);
  return d.toISOString().slice(0,10);
}
// nº de meses cheios entre duas datas
function monthsBetween(a,b){
  if(!a||!b)return '';
  const d1=new Date(a+'T00:00'),d2=new Date(b+'T00:00');
  let m=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth());
  if(d2.getDate()<d1.getDate())m--;
  return m>0?m:'';
}
// no modal: início + prazo(meses) -> data de término automática
function calcTermino(){
  const ini=document.getElementById('f_ini').value, meses=num(document.getElementById('f_prazo').value);
  if(ini&&meses>0)document.getElementById('f_fim').value=addMonths(ini,meses);
}
// se a pessoa editar a data de término manualmente, recalcula o prazo em meses
function calcPrazo(){
  const ini=document.getElementById('f_ini').value, fim=document.getElementById('f_fim').value;
  if(ini&&fim){const m=monthsBetween(ini,fim);if(m)document.getElementById('f_prazo').value=m;}
}

/* ---------- estimativa de impostos de fim de obra ----------
   Aproximação para planejamento (não é cálculo fiscal oficial).
   Considera tamanho da obra (área), nº de unidades e qualificação (padrão). */
function estimaFimObra(o){
  const area=+o.areaConstruida||0;
  const cub=(o.useCustoTotalM2 && +o.custoTotalM2>0) ? +o.custoTotalM2 : (+o.custoConstrucaoM2||0);
  const valorObra=area*cub;                       // valor (custo) da obra
  const q=QUALIF_FATOR[o.qualificacao]||QUALIF_FATOR['Normal'];
  const cmo=valorObra*q.mo;                        // remuneração de mão de obra estimada
  const inss=cmo*INSS_OBRA;                        // INSS / aferição (CNO)
  const iss=cmo*q.iss;                             // ISS no habite-se
  const unidades=Math.max(1,+o.numUnidades||1);
  const cartorio=valorObra*CART_PCT + unidades*CART_UNID; // averbação + individualização + encerramento afetação
  const outras=valorObra*OUTRAS_PCT;               // habite-se, CND, baixa RET
  const total=inss+iss+cartorio+outras;
  const pct=valorObra>0 ? total/valorObra*100 : 0;
  return {valorObra,cmo,inss,iss,cartorio,outras,total,pct,unidades};
}

/* ---------- VGV / cálculos ---------- */
function calc(o){
  const areaVend=+o.areaVendavel||0, areaConstr=+o.areaConstruida||0;
  let precoM2 = +o.precoVendaM2||0;
  if(o.useValorUnidade && +o.metragemUnidade>0) precoM2 = (+o.valorUnidade||0)/(+o.metragemUnidade);
  const vgv = (+o.vgvManual>0) ? +o.vgvManual : areaVend*precoM2;
  const simple = !!o.useCustoTotalM2 && +o.custoTotalM2>0;
  const impEst = estimaFimObra(o);
  const impostoFO = (o.impostoFimObra===''||o.impostoFimObra==null) ? impEst.total : +o.impostoFimObra;
  let custoConstr=0,custoTerreno=0,custoIndireto=0,custoTaxas=0,comissao=0,custoTotal=0,custoTotalM2=0;
  if(simple){
    custoTotalM2=+o.custoTotalM2||0;
    custoTotal=areaConstr*custoTotalM2 + impostoFO;
  }else{
    custoConstr = areaConstr*(+o.custoConstrucaoM2||0);
    custoTerreno=+o.custoTerreno||0;
    custoIndireto=+o.custosIndiretosValor||0;
    if(+o.custosIndiretosPct>0) custoIndireto += custoConstr*(+o.custosIndiretosPct/100);
    custoTaxas=+o.custoProjetosTaxas||0;
    comissao = vgv*(+o.comissaoVendasPct||0)/100;
    custoTotal = custoTerreno+custoConstr+custoIndireto+custoTaxas+comissao+impostoFO;
    custoTotalM2 = areaConstr>0 ? custoTotal/areaConstr : 0;
  }
  const impostoPctObra = impEst.valorObra>0 ? impostoFO/impEst.valorObra*100 : 0;
  const realizado=(o.lancamentos||[]).filter(l=>l.status==='Pago').reduce((s,l)=>s+(+l.valorRealizado||+l.valorPrevisto||0),0);
  const compromissado=(o.lancamentos||[]).reduce((s,l)=>s+(+l.valorRealizado||+l.valorPrevisto||0),0);
  const lucro = vgv-custoTotal;
  const margem = vgv>0 ? lucro/vgv*100 : 0;
  const roi = custoTotal>0 ? lucro/custoTotal*100 : 0;
  const lucroM2 = areaConstr>0 ? lucro/areaConstr : 0;
  return {simple,precoM2,vgv,custoConstr,custoTerreno,custoIndireto,custoTaxas,comissao,impostoFO,impEst,impostoPctObra,custoTotal,custoTotalM2,realizado,compromissado,lucro,margem,roi,lucroM2,areaVend,areaConstr};
}
function obraAlert(o){ // estouro de orçamento (compromissado > custo total estimado) ou margem negativa
  const c=calc(o);
  if(c.custoTotal>0 && c.compromissado>c.custoTotal) return 'over';
  if(c.vgv>0 && c.lucro<0) return 'neg';
  return null;
}
const alertCount=()=>state.obras.filter(o=>o.status!=='Concluída'&&obraAlert(o)).length;

/* ---------- auth (Firebase) ---------- */
const isAdmin=()=>session&&session.role==='Administrador';
function setAuthBusy(b){const btn=document.getElementById('loginBtn'); if(btn){btn.disabled=b; btn.textContent=b?'Entrando…':'Entrar';}}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr'); err.textContent='';
  if(!email||!p){err.textContent='Informe e-mail e senha.';return;}
  setAuthBusy(true);
  try{ await auth.signInWithEmailAndPassword(email,p); }
  catch(e){ setAuthBusy(false);
    err.textContent = (e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found')
      ? 'E-mail ou senha inválidos.' : (e.code==='auth/too-many-requests'?'Muitas tentativas. Tente mais tarde.':'Erro: '+e.code);
  }
}
async function forgotPass(){
  const email=document.getElementById('loginEmail').value.trim();
  const err=document.getElementById('loginErr'); err.textContent='';
  if(!email){err.textContent='Digite seu e-mail acima para receber o link.';return;}
  try{ await auth.sendPasswordResetEmail(email); toast('Link de redefinição enviado para '+email,'ok'); }
  catch(e){ err.textContent='Não foi possível enviar: '+e.code; }
}
function logout(){ detachListeners(); if(unsubSelf){unsubSelf();unsubSelf=null;} auth.signOut(); }

// reage a login/logout
function bootAuth(){
  loadTheme();
  auth.onAuthStateChanged(async user=>{
    if(!user){ showAuthScreen(); return; }
    try{
      const snap=await db.collection('users').doc(user.uid).get();
      if(!snap.exists){ await auth.signOut(); showAuthScreen('Sua conta ainda não foi liberada pelo administrador.'); return; }
      const u=snap.data();
      if(u.ativo===false){ await auth.signOut(); showAuthScreen('Conta desativada. Procure o administrador.'); return; }
      session={uid:user.uid,name:u.name||user.email,email:user.email,role:u.role||'Usuário'};
      // se o admin desativar/alterar este usuário durante a sessão, reflete na hora
      if(unsubSelf)unsubSelf();
      unsubSelf=db.collection('users').doc(user.uid).onSnapshot(s=>{
        if(!s.exists||s.data().ativo===false){ toast('Sua conta foi desativada.','err'); setTimeout(()=>logout(),1200); return; }
        const d=s.data(); if(session){session.role=d.role||'Usuário'; session.name=d.name||session.name;}
      });
      enterApp();
    }catch(e){ await auth.signOut(); showAuthScreen('Erro ao carregar seu perfil: '+e.code); }
  });
}
function showAuthScreen(msg){
  detachListeners(); session=null;
  document.getElementById('app').style.display='none';
  document.getElementById('authWrap').style.display='flex';
  const err=document.getElementById('loginErr'); if(err)err.textContent=msg||'';
  const pass=document.getElementById('loginPass'); if(pass)pass.value='';
  setAuthBusy(false);
}
function enterApp(){
  document.getElementById('authWrap').style.display='none';
  document.getElementById('app').style.display='block';
  uName.textContent=session.name; uRole.textContent=session.role;
  uAvatar.textContent=(session.name||'?').trim()[0]?.toUpperCase()||'?';
  buildNav(); applyPerms(); attachListeners(); go('dash');
}
function applyPerms(){
  document.querySelectorAll('.admin-only').forEach(e=>e.classList.toggle('hidden',!isAdmin()));
  document.getElementById('topAdd').style.display=isAdmin()?'':'none';
}

/* ---------- nav / router ---------- */
function buildNav(){
  sbNav.innerHTML=NAV.filter(n=>!n.admin||isAdmin()).map(n=>`
    <div class="nav-item" data-go="${n.id}" onclick="go('${n.id}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[n.id]}</svg>
      <span class="lbl">${n.label}</span>
      ${n.id==='obras'?`<span class="nav-badge" id="navAlert" style="display:none"></span>`:''}
    </div>`).join('');
  refreshAlertBadge();
}
function refreshAlertBadge(){
  const b=document.getElementById('navAlert'); if(!b)return;
  const c=alertCount(); b.style.display=c?'grid':'none'; b.textContent=c;
}
function go(id){
  if(id==='config'&&!isAdmin())id='dash';
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.toggle('active',e.dataset.go===id));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const realId = id==='obra' ? 'obra' : id;
  document.getElementById('page-'+realId).classList.add('active');
  const navMeta=NAV.find(n=>n.id===id);
  pageTitle.textContent = navMeta?navMeta.title:(id==='obra'?(currentObra?currentObra.nome:'Obra'):'Painel');
  document.getElementById('sidebar').classList.remove('mobile-open');
  ({dash:renderDash,obras:renderObras,obra:renderObra,custos:renderCustos,viab:renderViab,rel:renderRel,config:renderConfig}[id]||renderDash)();
}
function toggleSidebar(){ sidebar.classList.toggle('collapsed'); main.classList.toggle('wide'); }
function toggleTheme(){ state.theme=state.theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',state.theme); localStorage.setItem(THEMEKEY,state.theme); }

/* ---------- toast ---------- */
function toast(msg,type=''){ const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  toasts.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s';setTimeout(()=>t.remove(),300)},2600); }

/* ---------- modal ---------- */
function openModal(html){ modalHost.innerHTML=html; overlay.classList.add('open'); }
function closeModal(){ overlay.classList.remove('open'); modalHost.innerHTML=''; }
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});

/* ---- DASHBOARD: diário de lançamentos por data ---- */
let dashDate=new Date().toISOString().slice(0,10);
function shiftDash(days){const d=new Date(dashDate+'T00:00');d.setDate(d.getDate()+days);dashDate=d.toISOString().slice(0,10);renderDash();}
function setDashToday(){dashDate=new Date().toISOString().slice(0,10);renderDash();}
function onDashDate(v){if(v){dashDate=v;renderDash();}}
function renderDash(){
  const hoje=new Date().toISOString().slice(0,10);
  const isToday=dashDate===hoje;
  const dataLabel=isToday?'Hoje':new Date(dashDate+'T00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  // agrupa lançamentos da data selecionada por obra
  const groups=[]; let dayTotal=0, dayCount=0;
  state.obras.forEach(o=>{
    const ls=(o.lancamentos||[]).filter(l=>l.data===dashDate);
    if(ls.length){const sub=ls.reduce((s,l)=>s+(+l.valorRealizado||+l.valorPrevisto||0),0);
      groups.push({o,ls,sub}); dayTotal+=sub; dayCount+=ls.length;}
  });
  const ativas=state.obras.filter(o=>o.status!=='Concluída').length;

  document.getElementById('page-dash').innerHTML=`
    <div class="card" style="padding:16px 20px;margin-bottom:22px">
      <div class="flex between wrap" style="gap:14px">
        <div>
          <div style="font-family:var(--display);font-weight:800;font-size:20px;text-transform:capitalize">${dataLabel}</div>
          <div class="muted" style="font-size:13px;margin-top:2px">Lançamentos de custo registrados nesta data</div>
        </div>
        <div class="flex" style="gap:8px">
          <button class="btn-icon" title="Dia anterior" onclick="shiftDash(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
          <input class="input" type="date" value="${dashDate}" onchange="onDashDate(this.value)" style="width:auto">
          <button class="btn-icon" title="Próximo dia" onclick="shiftDash(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
          ${isToday?'':`<button class="btn btn-ghost btn-sm" style="width:auto" onclick="setDashToday()">Hoje</button>`}
        </div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi blue"><div class="klabel">Obras com lançamento</div><div class="kval mono">${groups.length}</div><div class="ksub">${ativas} obra(s) em andamento</div></div>
      <div class="kpi"><div class="klabel">Lançamentos na data</div><div class="kval mono">${dayCount}</div></div>
      ${isAdmin()?`<div class="kpi accent"><div class="klabel">Total lançado na data</div><div class="kval mono">${fmtBRL(dayTotal)}</div></div>`:''}
    </div>

    ${groups.length? groups.map(({o,ls,sub})=>{
      const st=STATUS.find(s=>s[0]===o.status)||STATUS[0];
      return `<div class="card" style="margin-bottom:16px">
        <div class="card-head" style="margin-bottom:14px">
          <div class="flex" style="gap:10px;cursor:pointer" onclick="openObra('${o.id}')">
            <h3 style="font-size:16px">${esc(o.nome)}</h3>
            <span class="badge ${st[1]}">${st[0]}</span>
            <span class="muted mono" style="font-size:12px">${esc(o.codigo||'')}</span>
          </div>
          ${isAdmin()?`<div class="flex" style="gap:6px"><span class="muted" style="font-size:12px">Subtotal do dia</span><b class="mono" style="font-size:15px;color:var(--accent)">${fmtBRL(sub)}</b></div>`:''}
        </div>
        <div style="overflow-x:auto"><table><thead><tr>
          <th>Descrição</th><th>Categoria</th><th>Fornecedor</th>${isAdmin()?'<th class="td-r">Valor</th>':''}<th>Status</th>${isAdmin()?'<th></th>':''}
        </tr></thead><tbody>
          ${ls.map(l=>{const ps=PAGSTATUS.find(p=>p[0]===l.status)||PAGSTATUS[0];const v=+l.valorRealizado||+l.valorPrevisto||0;
            return `<tr><td><b>${esc(l.descricao)}</b>${funcTag(l)}</td><td>${esc(l.categoria)}</td><td class="muted">${esc(l.fornecedor||'—')}</td>
            ${isAdmin()?`<td class="td-r">${fmtBRL2(v)}</td>`:''}
            <td><span class="badge ${ps[1]}">${ps[0]}</span></td>
            ${isAdmin()?`<td><div class="row-actions">
              <button class="icon-btn" title="Editar" onclick="openLancModal('${o.id}','${l.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
              <button class="icon-btn del" title="Excluir" onclick="delLanc('${o.id}','${l.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
            </div></td>`:''}</tr>`;}).join('')}
        </tbody></table></div>
      </div>`;}).join('')
    : `<div class="empty">
        <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01"/></svg>
        <p>Nenhum lançamento registrado em ${isToday?'hoje':'<b>'+dateBR(dashDate)+'</b>'}.</p>
        ${isAdmin()?`<button class="btn btn-primary" style="width:auto;padding:11px 22px" onclick="go('obras')">Ir para obras</button>`:''}
      </div>`}
  `;
}

/* ---- OBRAS LIST ---- */
let obrasFilter='Todas', obrasSearch='';
function renderObras(){
  const filters=['Todas',...STATUS.map(s=>s[0])];
  let list=state.obras.filter(o=>obrasFilter==='Todas'||o.status===obrasFilter);
  if(obrasSearch)list=list.filter(o=>(o.nome+o.cidade+o.codigo+o.tipo).toLowerCase().includes(obrasSearch.toLowerCase()));
  document.getElementById('page-obras').innerHTML=`
    <div class="toolbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="input" placeholder="Buscar obra, cidade, código..." value="${esc(obrasSearch)}" oninput="obrasSearch=this.value;renderObras()">
      </div>
      <div class="chip-row">${filters.map(f=>`<div class="chip ${obrasFilter===f?'active':''}" onclick="obrasFilter='${f}';renderObras()">${f}</div>`).join('')}</div>

    ${isAdmin()?`<div class="kpi-grid">

      <div class="kpi ${c.lucro>=0?'ok':'danger'}"><div class="klabel">Lucro previsto</div><div class="kval mono">${fmtBRL(c.lucro)}</div><div class="ksub">Margem ${fmtPct(c.margem)} · ROI ${fmtPct(c.roi)}</div></div>
      <div class="kpi blue"><div class="klabel">Lucro / m²</div><div class="kval mono">${fmtBRL(c.lucroM2)}</div></div>

function obraCron(o){
  const et=o.etapas||[];

let custFilter='Todas';
// resumo das retiradas de empreita agrupadas por funcionário (todas as obras)
function empreitaResumoHTML(){
  const por={};
  state.obras.forEach(o=>(o.lancamentos||[]).filter(l=>l.categoria==='Empreita').forEach(l=>{
    const k=l.funcionarioNome||'(sem funcionário)';
    if(!por[k])por[k]={pago:0,prev:0,n:0};
    const v=+l.valorRealizado||+l.valorPrevisto||0;
    por[k].n++; por[k].prev+=v; if(l.status==='Pago')por[k].pago+=v;
  }));
  const linhas=Object.entries(por).sort((a,b)=>b[1].prev-a[1].prev);
  if(!linhas.length)return '';
  const total=linhas.reduce((s,[,v])=>s+v.prev,0);
  return `<div class="card mb">
    <div class="card-head"><h3>Empreita por funcionário</h3><span class="muted mono">Total ${fmtBRL(total)}</span></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Funcionário</th><th class="td-r">Retiradas</th><th class="td-r">Pago</th><th class="td-r">Total</th></tr></thead><tbody>
      ${linhas.map(([nome,v])=>`<tr><td><b>${esc(nome)}</b></td><td class="td-r">${v.n}</td>
        <td class="td-r">${fmtBRL(v.pago)}</td><td class="td-r"><b>${fmtBRL(v.prev)}</b></td></tr>`).join('')}
    </tbody></table></div>
  </div>`;
}
function renderCustos(){
  if(!isAdmin()){document.getElementById('page-custos').innerHTML=emptyHTML('Sem permissão para ver custos');return;}

  state.obras.forEach(o=>(o.lancamentos||[]).forEach(l=>all.push({...l,obra:o.nome,obraId:o.id})));

  all.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const total=all.reduce((s,l)=>s+(+l.valorRealizado||+l.valorPrevisto||0),0);
  const pago=all.filter(l=>l.status==='Pago').reduce((s,l)=>s+(+l.valorRealizado||+l.valorPrevisto||0),0);
  document.getElementById('page-custos').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi accent"><div class="klabel">Total comprometido</div><div class="kval mono">${fmtBRL(total)}</div></div>
      <div class="kpi ok"><div class="klabel">Pago</div><div class="kval mono">${fmtBRL(pago)}</div></div>
      <div class="kpi warn" style="--accent:var(--warn)"><div class="klabel">A pagar</div><div class="kval mono">${fmtBRL(total-pago)}</div></div>
      <div class="kpi blue"><div class="klabel">Lançamentos</div><div class="kval mono">${all.length}</div></div>
    </div>
    <div class="toolbar"><div class="chip-row">

    </div></div>
    ${empreitaResumoHTML()}
    <div class="card">
      ${all.length?`<div style="overflow-x:auto"><table><thead><tr>
        <th>Obra</th><th>Descrição</th><th>Categoria</th><th>Data</th><th class="td-r">Previsto</th><th class="td-r">Realizado</th><th>Status</th><th></th></tr></thead><tbody>
        ${all.map(l=>{const ps=PAGSTATUS.find(p=>p[0]===l.status)||PAGSTATUS[0];
          return `<tr onclick="openObra('${l.obraId}')" style="cursor:pointer"><td><b>${esc(l.obra)}</b></td><td>${esc(l.descricao)}${funcTag(l)}</td>
          <td>${esc(l.categoria)}</td><td class="muted">${dateBR(l.data)}</td>
          <td class="td-r">${fmtBRL2(+l.valorPrevisto||0)}</td><td class="td-r">${l.valorRealizado?fmtBRL2(+l.valorRealizado):'—'}</td>
          <td><span class="badge ${ps[1]}">${ps[0]}</span></td>
          <td><div class="row-actions">
            <button class="icon-btn" title="Editar" onclick="event.stopPropagation();openLancModal('${l.obraId}','${l.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
            <button class="icon-btn del" title="Excluir" onclick="event.stopPropagation();delLanc('${l.obraId}','${l.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
          </div></td></tr>`;}).join('')}

let viabModel={areaConstruida:'',areaVendavel:'',custoConstrucaoM2:'',precoVendaM2:'',custoTerreno:'',custosIndiretosPct:'10',custoProjetosTaxas:'',comissaoVendasPct:'4',vgvManual:'',numUnidades:'',useCustoTotalM2:false,custoTotalM2:'',useValorUnidade:false,valorUnidade:'',metragemUnidade:'',qualificacao:'Normal',impostoFimObra:''};
function renderViab(){

    <input class="input" inputmode="decimal" value="${esc(viabModel[key])}" placeholder="${ph||'0'}" oninput="viabModel.${key}=this.value;updateViab()">

        <div class="section-title" style="margin-top:0">Dimensões</div>

        <div class="section-title">Custos</div>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rad-s);padding:11px 13px;margin-bottom:14px">
          <input type="checkbox" ${viabModel.useCustoTotalM2?'checked':''} onchange="viabModel.useCustoTotalM2=this.checked;renderViab()" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer">
          <span><b>Usar custo total por m²</b> <span class="muted">— um valor único que já inclui tudo</span></span>
        </label>
        ${viabModel.useCustoTotalM2
          ? `<div class="fgrid">${f('Custo total da obra / m²','custoTotalM2','R$')}</div>`
          : `<div class="fgrid">${f('Custo de construção / m²','custoConstrucaoM2','R$')}${f('Custo do terreno','custoTerreno','R$')}${f('Custos indiretos','custosIndiretosPct','%')}${f('Projetos / taxas','custoProjetosTaxas','R$')}${f('Comissão de vendas','comissaoVendasPct','%')}</div>`}
        <div class="fgrid mt"><div class="field"><label>Qualificação (padrão)</label>
          <select class="input" onchange="viabModel.qualificacao=this.value;renderViab()">
            ${QUALIF.map(q=>`<option ${(viabModel.qualificacao||'Normal')===q?'selected':''}>${q}</option>`).join('')}
          </select></div></div>

        <div class="section-title">Receita</div>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rad-s);padding:11px 13px;margin-bottom:14px">
          <input type="checkbox" ${viabModel.useValorUnidade?'checked':''} onchange="viabModel.useValorUnidade=this.checked;renderViab()" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer">

function updateViab(){ document.getElementById('viabResult').innerHTML=viabResultHTML(calc(numifyModel(viabModel))); }
function numifyModel(m){return {areaConstruida:num(m.areaConstruida),areaVendavel:num(m.areaVendavel),numUnidades:num(m.numUnidades),
  custoConstrucaoM2:num(m.custoConstrucaoM2),custoTerreno:num(m.custoTerreno),custosIndiretosPct:num(m.custosIndiretosPct),
  custoProjetosTaxas:num(m.custoProjetosTaxas),comissaoVendasPct:num(m.comissaoVendasPct),precoVendaM2:num(m.precoVendaM2),
  vgvManual:num(m.vgvManual),useCustoTotalM2:!!m.useCustoTotalM2,custoTotalM2:num(m.custoTotalM2),
  useValorUnidade:!!m.useValorUnidade,valorUnidade:num(m.valorUnidade),metragemUnidade:num(m.metragemUnidade),
  qualificacao:m.qualificacao||'Normal',impostoFimObra:(m.impostoFimObra===''||m.impostoFimObra==null)?'':num(m.impostoFimObra),lancamentos:[]};}
function ringChart(c){
  const C=326.73, r=52, vgv=c.vgv||0;
  const neg=c.lucro<0;
  const costFrac=vgv>0?Math.min(1,c.custoTotal/vgv):0;
  const profFrac=vgv>0?Math.max(0,c.lucro)/vgv:0;
  const costLen=(neg?1:costFrac)*C, profLen=profFrac*C;
  const costCol=neg?'var(--danger)':'var(--blue)';
  const mColor=c.margem>=20?'var(--ok)':c.margem>=0?'var(--accent)':'var(--danger)';
  return `<div style="display:flex;justify-content:center;margin-bottom:8px"><svg width="156" height="156" viewBox="0 0 140 140">
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="15"/>
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="${costCol}" stroke-width="15" stroke-linecap="round"
      stroke-dasharray="${costLen.toFixed(1)} ${(C-costLen).toFixed(1)}" transform="rotate(-90 70 70)"/>
    ${profLen>1?`<circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--ok)" stroke-width="15" stroke-linecap="round"
      stroke-dasharray="${profLen.toFixed(1)} ${(C-profLen).toFixed(1)}" stroke-dashoffset="${(-costLen).toFixed(1)}" transform="rotate(-90 70 70)"/>`:''}
    <text x="70" y="66" text-anchor="middle" font-family="Archivo,sans-serif" font-weight="800" font-size="27" fill="${mColor}">${fmtPct(c.margem)}</text>
    <text x="70" y="85" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="9.5" fill="var(--muted)" letter-spacing="1.5">MARGEM</text>
  </svg></div>
  <div class="legend" style="justify-content:center;margin:0 0 8px">
    <span><i class="dot" style="background:${costCol}"></i>Custo ${fmtPct(vgv>0?c.custoTotal/vgv*100:0)}</span>
    <span><i class="dot" style="background:var(--ok)"></i>Lucro ${fmtPct(Math.max(0,c.margem))}</span>
  </div>`;
}
function viabResultHTML(c){
  const margemColor=c.margem>=20?'var(--ok)':c.margem>=0?'var(--warn)':'var(--danger)';
  const gw=Math.max(2,Math.min(100,c.margem));
  return `
    ${ringChart(c)}
    <div class="result-hero" style="padding-top:2px"><small>VGV — Valor Geral de Vendas</small><div class="big mono">${fmtBRL(c.vgv)}</div></div>
    ${c.simple
      ? `<div class="result-line"><span class="lab">Custo total / m²</span><span class="num mono">${fmtBRL2(c.custoTotalM2)}</span></div>`
      : `<div class="result-line"><span class="lab">Custo do terreno</span><span class="num mono">${fmtBRL(c.custoTerreno)}</span></div>
    <div class="result-line"><span class="lab">Custo de construção</span><span class="num mono">${fmtBRL(c.custoConstr)}</span></div>
    <div class="result-line"><span class="lab">Custos indiretos</span><span class="num mono">${fmtBRL(c.custoIndireto)}</span></div>
    <div class="result-line"><span class="lab">Projetos / taxas</span><span class="num mono">${fmtBRL(c.custoTaxas)}</span></div>
    <div class="result-line"><span class="lab">Comissão de vendas</span><span class="num mono">${fmtBRL(c.comissao)}</span></div>
    <div class="result-line"><span class="lab">Imposto de fim de obra (${fmtPct(c.impostoPctObra)})</span><span class="num mono">${fmtBRL(c.impostoFO)}</span></div>`}
    ${c.simple&&c.impostoFO>0?`<div class="result-line"><span class="lab">Imposto de fim de obra (${fmtPct(c.impostoPctObra)})</span><span class="num mono">${fmtBRL(c.impostoFO)}</span></div>`:''}
    <div class="result-line"><span class="lab"><b>Custo total</b></span><span class="num mono"><b>${fmtBRL(c.custoTotal)}</b></span></div>
    <div class="result-hero" style="padding-top:14px"><small>Lucro previsto</small>
      <div class="big mono ${c.lucro>=0?'pos':'neg'}">${fmtBRL(c.lucro)}</div></div>
    <div class="gauge"><i style="width:${gw}%;background:${margemColor}"></i></div>
    <div class="flex between"><span class="lab muted">Margem ${fmtPct(c.margem)}</span><span class="lab muted">ROI ${fmtPct(c.roi)}</span></div>
    <div class="result-line mt"><span class="lab">Lucro por m² construído</span><span class="num mono">${fmtBRL(c.lucroM2)}</span></div>`;
}
function saveViabAsObra(){
  const m=viabModel;

          <td class="td-r">${fmtPct(c.roi)}</td></tr>`).join('')}

function exportCSV(){
  const head=['Obra','Codigo','Tipo','Status','Cidade','Area construida','Area vendavel','VGV','Custo total','Lucro','Margem %','ROI %'];
  const lines=state.obras.map(o=>{const c=calc(o);return [o.nome,o.codigo,o.tipo,o.status,o.cidade,o.areaConstruida,o.areaVendavel,
    Math.round(c.vgv),Math.round(c.custoTotal),Math.round(c.lucro),c.margem.toFixed(1),c.roi.toFixed(1)]
    .map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(';');});
  const csv=[head.join(';'),...lines].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));
  a.download='obraviva_relatorio.csv';a.click();toast('CSV exportado','ok');
}

/* =================== MODALS / CRUD =================== */
function field(lbl,id,val='',type='text',ph='',sfx=''){
  return `<div class="field"><label>${lbl}</label>${sfx?`<div class="input-suffix">`:''}
    <input class="input" id="${id}" type="${type}" value="${esc(val)}" placeholder="${ph}" ${type==='text'&&sfx?'inputmode="decimal"':''}>
    ${sfx?`<span class="sfx">${sfx}</span></div>`:''}</div>`;
}
function sel(lbl,id,opts,val){return `<div class="field"><label>${lbl}</label><select class="input" id="${id}">
  ${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;}
// select extensível: com botão "+" para admin adicionar opções (kind: 'tipo' | 'categoria')
function selExt(lbl,id,opts,val,kind,onchange){
  const add = (isAdmin()&&kind) ? `<button type="button" class="btn-icon" title="Adicionar opção" onclick="openAddOpt('${kind}','${id}')" style="flex:0 0 38px">+</button>` : '';
  return `<div class="field"><label>${lbl}</label>
    <div class="flex" style="gap:8px;align-items:stretch">
      <select class="input" id="${id}" ${onchange?`onchange="${onchange}"`:''} style="flex:1">${opts.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select>
      ${add}</div></div>`;
}
// select de funcionário (valor = id), com "+" para admin
function selFunc(id,val){
  const fs=listFuncs();
  const opts=`<option value="">— selecione o funcionário —</option>`+fs.map(f=>`<option value="${f.id}" ${f.id===val?'selected':''}>${esc(f.nome)}${f.funcao?' — '+esc(f.funcao):''}</option>`).join('');
  const add = isAdmin()?`<button type="button" class="btn-icon" title="Adicionar funcionário" onclick="openAddOpt('funcionario','${id}')" style="flex:0 0 38px">+</button>`:'';
  return `<div class="field"><label>Funcionário (empreita)</label>
    <div class="flex" style="gap:8px;align-items:stretch">
      <select class="input" id="${id}" style="flex:1">${opts}</select>${add}</div></div>`;
}
// mini-prompt sobreposto (fica acima do modal aberto, sem perder o formulário)
function openAddOpt(kind,selectId){
  const isFunc=kind==='funcionario';
  const titulo=isFunc?'Novo funcionário':(kind==='tipo'?'Novo tipo de obra':'Nova categoria');
  const body=isFunc
    ? `<div class="field"><label>Nome</label><input class="input" id="mp_nome" placeholder="Ex: João Silva"></div>
       <div class="field"><label>Função</label><input class="input" id="mp_funcao" placeholder="Ex: Eletricista"></div>`
    : `<div class="field"><label>Nome</label><input class="input" id="mp_val" placeholder="Digite e confirme"></div>`;
  const host=document.createElement('div');
  host.className='overlay open'; host.style.zIndex='130';
  host.innerHTML=`<div class="modal" style="max-width:420px"><div class="modal-head"><h3>${titulo}</h3>
    <button class="btn-icon" onclick="this.closest('.overlay').remove()">✕</button></div>
    <div class="modal-body">${body}<div class="auth-err" id="mp_err" style="margin-top:6px"></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px" id="mp_ok">Adicionar</button></div></div>`;
  document.body.appendChild(host);
  host.addEventListener('click',e=>{if(e.target===host)host.remove();});
  host.querySelector('#mp_ok').onclick=async()=>{
    const err=host.querySelector('#mp_err'); err.textContent='';
    try{
      if(isFunc){
        const nome=host.querySelector('#mp_nome').value.trim(), funcao=host.querySelector('#mp_funcao').value.trim();
        if(!nome){err.textContent='Informe o nome.';return;}
        const f={id:uid(),nome,funcao};
        await db.collection('meta').doc('lists').set({funcionarios:firebase.firestore.FieldValue.arrayUnion(f)},{merge:true});
        if(selectId){const s=document.getElementById(selectId);const o=document.createElement('option');o.value=f.id;o.textContent=nome+(funcao?' — '+funcao:'');o.selected=true;s.appendChild(o);}
      }else{
        const v=host.querySelector('#mp_val').value.trim();
        if(!v){err.textContent='Informe o nome.';return;}
        const field=kind==='tipo'?'tipos':'categorias';
        await db.collection('meta').doc('lists').set({[field]:firebase.firestore.FieldValue.arrayUnion(v)},{merge:true});
        if(selectId){const s=document.getElementById(selectId);
          if(![...s.options].some(op=>op.value===v)){const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);}
          s.value=v; if(s.getAttribute('onchange'))s.dispatchEvent(new Event('change'));}
      }
      toast('Adicionado','ok'); host.remove();
    }catch(e){ err.textContent='Erro: '+e.code; }
  };
  setTimeout(()=>{const f=host.querySelector('input');if(f)f.focus();},50);
}
function removeFuncionario(id){
  const f=listFuncs().find(x=>x.id===id);
  confirmModal('Remover funcionário?',`<b>${esc(f?f.nome:'')}</b> sairá da lista (lançamentos já feitos são mantidos).`,async()=>{
    try{ await db.collection('meta').doc('lists').update({funcionarios:firebase.firestore.FieldValue.arrayRemove(f)}); toast('Removido','ok'); }
    catch(e){ toast('Erro: '+e.code,'err'); }
  });
}
function openFuncModal(){ openAddOpt('funcionario',null); }

function toggleCostMode(){
  const on=document.getElementById('f_useTot').checked;
  document.getElementById('costSimple').style.display=on?'block':'none';
  document.getElementById('costDetailed').style.display=on?'none':'block';
}
function toggleRevMode(){
  const on=document.getElementById('f_useUnit').checked;
  document.getElementById('revUnit').style.display=on?'block':'none';
  document.getElementById('revPrice').style.display=on?'none':'block';
  if(on)updateUnitPrice();
}
function updateUnitPrice(){
  const vu=num(document.getElementById('f_vu').value), mu=num(document.getElementById('f_mu').value);
  document.getElementById('f_unitCalc').textContent = mu>0 ? fmtBRL2(vu/mu)+' /m²' : '—';
}
// lê os campos atuais do modal e estima o imposto de fim de obra ao vivo
function readObraForm(){
  const g=x=>{const e=document.getElementById(x);return e?e.value:'';};
  return {areaConstruida:num(g('f_ac')),custoConstrucaoM2:num(g('f_ccm2')),
    useCustoTotalM2:document.getElementById('f_useTot')?document.getElementById('f_useTot').checked:false,
    custoTotalM2:num(g('f_ctm2')),numUnidades:num(g('f_un')),qualificacao:g('f_qualif')};
}
function updateFimObra(){
  const est=estimaFimObra(readObraForm());
  const ro=document.getElementById('fimObraReadout');
  if(ro)ro.innerHTML = est.valorObra>0 ? `≈ ${fmtBRL(est.total)} <span class="muted" style="font-weight:600">(${fmtPct(est.pct)} do valor da obra)</span>` : '— informe área e custo/m²';
  const det=document.getElementById('fimObraDetalhe');
  if(det)det.innerHTML = est.valorObra>0 ?
    `INSS / aferição (CNO): <b class="mono">${fmtBRL(est.inss)}</b> &nbsp;·&nbsp; ISS habite-se: <b class="mono">${fmtBRL(est.iss)}</b><br>`+
    `Averbação + individualização (${est.unidades} un) + afetação: <b class="mono">${fmtBRL(est.cartorio)}</b> &nbsp;·&nbsp; Taxas / CND / baixa RET: <b class="mono">${fmtBRL(est.outras)}</b>` : '';
  const inp=document.getElementById('f_imp');
  if(inp)inp.placeholder = est.valorObra>0 ? 'auto ≈ '+Math.round(est.total) : 'auto';
}
// se o override ficar em branco, preenche com a estimativa atual (mantém editável)
function impostoAutoFill(){
  const el=document.getElementById('f_imp');
  if(el&&el.value.trim()===''){const est=estimaFimObra(readObraForm()); if(est.total>0)el.value=Math.round(est.total);}
}
async function saveObra(id){
  const g=x=>document.getElementById(x).value;
  const nome=g('f_nome').trim(); if(!nome){toast('Informe o nome da obra','err');return;}
  const data={nome,codigo:g('f_codigo').trim(),tipo:g('f_tipo'),status:g('f_status'),cidade:g('f_cidade').trim(),
    responsavel:g('f_resp').trim(),dataInicio:g('f_ini'),dataPrevisaoTermino:g('f_fim'),prazoMeses:num(g('f_prazo')),
    areaTerreno:num(g('f_at')),areaConstruida:num(g('f_ac')),areaVendavel:num(g('f_av')),numUnidades:num(g('f_un')),
    custoConstrucaoM2:num(g('f_ccm2')),custoTerreno:num(g('f_ct')),custosIndiretosPct:num(g('f_ci')),custosIndiretosValor:num(g('f_civ')),
    custoProjetosTaxas:num(g('f_tx')),comissaoVendasPct:num(g('f_com')),precoVendaM2:num(g('f_pv')),vgvManual:num(g('f_vgv')),
    useCustoTotalM2:document.getElementById('f_useTot').checked,custoTotalM2:num(g('f_ctm2')),
    useValorUnidade:document.getElementById('f_useUnit').checked,valorUnidade:num(g('f_vu')),metragemUnidade:num(g('f_mu')),
    qualificacao:g('f_qualif'),impostoFimObra:(g('f_imp').trim()===''?'':num(g('f_imp'))),
    notas:g('f_notas').trim()};
  try{
    if(id){ await db.collection('obras').doc(id).update(data); toast('Obra atualizada','ok'); }
    else{ const newId=uid(); await db.collection('obras').doc(newId).set({createdAt:Date.now(),lancamentos:[],etapas:[],...data});
      currentObra={id:newId,lancamentos:[],etapas:[],...data}; toast('Obra criada','ok'); }
    closeModal();
    if(!id) go('obra');
  }catch(e){ toast('Erro ao salvar: '+e.code,'err'); }
}

    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px" onclick="saveLanc('${obraId}','${lid||''}')">Salvar</button></div></div>`);
}
function onLancCat(){
  const isEmp=document.getElementById('l_cat').value==='Empreita';
  document.getElementById('l_func_wrap').style.display=isEmp?'block':'none';
}
async function saveLanc(obraId,lid){
  const o=state.obras.find(x=>x.id===obraId);if(!o)return;const g=x=>document.getElementById(x).value;
  const desc=g('l_desc').trim();if(!desc){toast('Informe a descrição','err');return;}
  const cat=g('l_cat');
  let funcionarioId='', funcionarioNome='';
  if(cat==='Empreita'){
    funcionarioId=g('l_func')||'';
    if(!funcionarioId){toast('Selecione o funcionário da empreita','err');return;}
    funcionarioNome=funcNome(funcionarioId);
  }
  const d={descricao:desc,categoria:cat,fornecedor:g('l_forn').trim(),valorPrevisto:num(g('l_prev')),
    valorRealizado:num(g('l_real')),data:g('l_data'),status:g('l_status'),autor:session.name,
    funcionarioId,funcionarioNome};
  const arr=(o.lancamentos||[]).slice();
  if(lid){const i=arr.findIndex(x=>x.id===lid);if(i>=0)arr[i]={...arr[i],...d};}
  else{arr.push({id:uid(),...d});}
  try{ await db.collection('obras').doc(obraId).update({lancamentos:arr}); closeModal();toast('Lançamento salvo','ok'); }
  catch(e){ toast('Erro ao salvar: '+e.code,'err'); }
}
function delLanc(obraId,lid){
  const o=state.obras.find(x=>x.id===obraId);if(!o)return;const l=(o.lancamentos||[]).find(x=>x.id===lid);
  confirmModal('Excluir lançamento?',`“${esc(l?l.descricao:'')}” será removido permanentemente.`,async()=>{
    const arr=(o.lancamentos||[]).filter(x=>x.id!==lid);
    try{ await db.collection('obras').doc(obraId).update({lancamentos:arr}); toast('Lançamento removido','ok'); }
    catch(e){ toast('Erro ao excluir: '+e.code,'err'); }
  });
}
// re-renderiza a tela ativa (mantido por compatibilidade; os listeners já re-renderizam)
function refreshAfterLanc(){ refreshActive(); }

  const o=state.obras.find(x=>x.id===obraId);const e=eid?o.etapas.find(x=>x.id===eid):{};
  openModal(`<div class="modal"><div class="modal-head"><h3>${eid?'Editar etapa':'Nova etapa'}</h3>
    <button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${field('Nome da etapa','e_nome',e.nome||'','text','Ex: Fundação')}
      <div class="fgrid-2">${field('Início','e_ini',e.inicio||'','date')}${field('Fim','e_fim',e.fim||'','date')}</div>
      ${field('Progresso','e_prog',e.prog||'0','text','0','%')}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px" onclick="saveEtapa('${obraId}','${eid||''}')">Salvar</button></div></div>`);
}
async function saveEtapa(obraId,eid){const o=state.obras.find(x=>x.id===obraId);if(!o)return;const g=x=>document.getElementById(x).value;
  const nome=g('e_nome').trim();if(!nome){toast('Informe o nome','err');return;}
  const d={nome,inicio:g('e_ini'),fim:g('e_fim'),prog:Math.min(100,num(g('e_prog')))};
  const arr=(o.etapas||[]).slice();
  if(eid){const i=arr.findIndex(x=>x.id===eid);if(i>=0)arr[i]={...arr[i],...d};}else arr.push({id:uid(),...d});
  try{ await db.collection('obras').doc(obraId).update({etapas:arr}); closeModal();toast('Etapa salva','ok'); }
  catch(e){ toast('Erro ao salvar: '+e.code,'err'); }}
function delEtapa(obraId,eid){const o=state.obras.find(x=>x.id===obraId);if(!o)return;
  const arr=(o.etapas||[]).filter(x=>x.id!==eid);
  db.collection('obras').doc(obraId).update({etapas:arr}).catch(e=>toast('Erro: '+e.code,'err'));}

function openUserModal(){
  openModal(`<div class="modal"><div class="modal-head"><h3>Novo usuário</h3><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${field('Nome','u_name')}${field('E-mail','u_email','','email','nome@email.com')}${field('Senha provisória','u_pass','','password','mínimo 6 caracteres')}
    ${sel('Perfil','u_role',['Usuário','Administrador'],'Usuário')}
    <p class="hint">O perfil <b>Usuário</b> acessa obras, dimensões e cronograma, mas não vê valores financeiros. O usuário pode trocar a senha depois via "Esqueci minha senha".</p>
    <div class="auth-err" id="u_err" style="margin-top:8px"></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px" id="u_btn" onclick="saveUser()">Criar usuário</button></div></div>`);
}
async function saveUser(){
  const g=x=>document.getElementById(x).value;
  const name=g('u_name').trim(),email=g('u_email').trim(),p=g('u_pass'),role=g('u_role');
  const err=document.getElementById('u_err'); err.textContent='';
  if(!name||!email||!p){err.textContent='Preencha todos os campos.';return;}
  if(p.length<6){err.textContent='A senha precisa de ao menos 6 caracteres.';return;}
  const btn=document.getElementById('u_btn'); btn.disabled=true; btn.textContent='Criando…';
  // app secundário: cria o usuário sem deslogar o admin
  let sec;
  try{
    sec = firebase.initializeApp(firebaseConfig, 'sec-'+Date.now());
    const cred = await sec.auth().createUserWithEmailAndPassword(email,p);
    await db.collection('users').doc(cred.user.uid).set({name,email,role,ativo:true,createdAt:Date.now(),criadoPor:session.email});
    await sec.auth().signOut();
    toast('Usuário criado','ok'); closeModal();
  }catch(e){
    btn.disabled=false; btn.textContent='Criar usuário';
    err.textContent = e.code==='auth/email-already-in-use' ? 'Este e-mail já está cadastrado.'
      : e.code==='auth/invalid-email' ? 'E-mail inválido.' : 'Erro: '+e.code;
  }finally{ if(sec){ try{ await sec.delete(); }catch(_){}}}
}
function toggleUserAtivo(id,ativo){
  db.collection('users').doc(id).update({ativo}).then(()=>toast(ativo?'Usuário ativado':'Usuário desativado','ok'))
    .catch(e=>toast('Erro: '+e.code,'err'));
}
function resetUserPass(email){
  confirmModal('Enviar redefinição de senha?',`Será enviado um link para <b>${esc(email)}</b>.`,async()=>{
    try{ await auth.sendPasswordResetEmail(email); toast('Link enviado para '+email,'ok'); }
    catch(e){ toast('Erro: '+e.code,'err'); }
  });
}
function delUser(id){
  const u=state.users.find(x=>x.id===id);
  confirmModal('Remover usuário?',`O acesso de <b>${esc(u?u.name:'')}</b> será removido. (O login no Firebase Authentication deve ser excluído manualmente no console, se desejar.)`,async()=>{
    try{ await db.collection('users').doc(id).delete(); toast('Usuário removido','ok'); }
    catch(e){ toast('Erro: '+e.code,'err'); }
  });
}

function confirmModal(title,msg,onYes){
  openModal(`<div class="modal" style="max-width:420px"><div class="modal-head"><h3>${title}</h3></div>
    <div class="modal-body"><p class="muted">${msg||'Esta ação não pode ser desfeita.'}</p></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px;background:var(--danger);color:#fff" id="confirmYes">Confirmar</button></div></div>`);
  document.getElementById('confirmYes').onclick=()=>{closeModal();onYes();};
}

}

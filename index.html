async function saveFuncionario(obraId,fid){
  const o=state.obras.find(x=>x.id===obraId); if(!o)return;const g=x=>document.getElementById(x).value;
  const nome=g('ef_nome').trim(); if(!nome){document.getElementById('ef_err').textContent='Informe o nome.';return;}
  const arr=(o.funcionarios||[]).map(f=>f.id===fid?{...f,nome,funcao:g('ef_funcao').trim(),saldoEmpreita:num(g('ef_saldo')),alertaEmpreita:num(g('ef_alerta'))}:f);
  try{ await db.collection('obras').doc(obraId).update({funcionarios:arr}); closeModal(); toast('Funcionário atualizado','ok'); }
  catch(e){ toast('Erro: '+e.code,'err'); }
}

function toggleCostMode(){
  const on=document.getElementById('f_useTot').checked;
  document.getElementById('costSimple').style.display=on?'block':'none';
  document.getElementById('costDetailed').style.display=on?'none':'block';
}
function toggleUnitExtra(){
  document.getElementById('gardenWrap').style.display=document.getElementById('f_hasGarden').checked?'grid':'none';
  document.getElementById('cobWrap').style.display=document.getElementById('f_hasCob').checked?'grid':'none';
}
function toggleRevMode(){
  const on=document.getElementById('f_useUnit').checked;
  document.getElementById('revUnit').style.display=on?'block':'none';
  document.getElementById('revPrice').style.display=on?'none':'block';
  if(on)updateUnitPrice();
}
function updateUnitPrice(){
  const vu=num(document.getElementById('f_vu').value), mu=num(document.getElementById('f_mu').value);
  document.getElementById('f_unitCalc').textContent = mu>0 ? fmtBRL2(vu/mu)+' /m²' : '—';
}
// lê os campos atuais do modal e estima o imposto de fim de obra ao vivo
function readObraForm(){
  const g=x=>{const e=document.getElementById(x);return e?e.value:'';};
  return {areaConstruida:num(g('f_ac')),custoConstrucaoM2:num(g('f_ccm2')),
    useCustoTotalM2:document.getElementById('f_useTot')?document.getElementById('f_useTot').checked:false,
    custoTotalM2:num(g('f_ctm2')),numUnidades:num(g('f_un')),qualificacao:g('f_qualif')};
}
function updateFimObra(){
  const est=estimaFimObra(readObraForm());
  const ro=document.getElementById('fimObraReadout');
  if(ro)ro.innerHTML = est.valorObra>0 ? `≈ ${fmtBRL(est.total)} <span class="muted" style="font-weight:600">(${fmtPct(est.pct)} do valor da obra)</span>` : '— informe área e custo/m²';
  const det=document.getElementById('fimObraDetalhe');

/* ===== importador genérico de planilhas (.xlsx / .csv) do computador ===== */
const IMP_FIELDS=[['data','Data'],['fornecedor','Fornecedor'],['descricao','Descrição'],['subcategoria','Subcategoria'],['categoria','Categoria'],['forma','Forma de pagamento'],['valor','Valor'],['obs','Observações']];
const IMP_ALIASES={
  data:['data','dt','datapagamento','datadepagamento','vencimento','competencia','dtpagamento'],
  fornecedor:['fornecedor','razaosocial','fornecedorrazaosocial','empresa','credor','beneficiario','favorecido'],
  descricao:['descricao','historico','memo','detalhe','discriminacao','referente'],
  subcategoria:['subcategoria','subcat'],
  categoria:['categoria','tipo','grupo'],
  forma:['formadepagamento','forma','meiodepagamento','pagamento','formapagto'],
  valor:['valor','valorpago','valorrs','total','vlr','montante','valorr'],
  obs:['observacoes','obs','observacao','nota','notas','comentario']
};
let importState={rows:[],headers:[],map:{}};
function normHdr(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]/g,''); }
function detectCol(field,headers){
  const al=IMP_ALIASES[field]||[];
  for(let i=0;i<headers.length;i++){const h=normHdr(headers[i]); if(al.includes(h))return i;}
  for(let i=0;i<headers.length;i++){const h=normHdr(headers[i]); if(al.some(a=>h.includes(a)&&a.length>3))return i;}
  return -1;
}
function parseCSV(text){
  const first=text.split(/\r?\n/)[0]||'';
  const delim=(first.split(';').length>first.split(',').length)?';':',';
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true; else if(ch===delim){row.push(cur);cur='';}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(ch==='\r'){} else cur+=ch; } }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>String(c).trim()!==''));
}
function impDateISO(v){
  if(v==null||v==='')return '';
  if(v instanceof Date && !isNaN(v)) return v.getUTCFullYear()+'-'+String(v.getUTCMonth()+1).padStart(2,'0')+'-'+String(v.getUTCDate()).padStart(2,'0');
  if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400000));return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
  const s=String(v).trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/); if(m){let y=m[3];if(y.length===2)y='20'+y;return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  return s;
}
function impNum(v){
  if(typeof v==='number')return v;
  let s=String(v||'').replace(/r\$/gi,'').replace(/\s/g,'').trim(); if(!s)return 0;
  if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.'); 
  const n=parseFloat(s); return isFinite(n)?n:0;
}
function openImportSheet(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.xlsx,.xls,.csv';
  inp.onchange=()=>{ const f=inp.files[0]; if(f)readSheetFile(f); };
  inp.click();
}
function readSheetFile(file){
  const name=file.name.toLowerCase(); const rd=new FileReader();
  rd.onload=()=>{
    try{
      let rows;
      if(name.endsWith('.csv')){ rows=parseCSV(rd.result); }
      else{ const wb=XLSX.read(new Uint8Array(rd.result),{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]]; rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''}); }
      rows=rows.filter(r=>Array.isArray(r)&&r.some(c=>String(c).trim()!==''));
      if(rows.length<2){ toast('Planilha vazia ou sem linhas de dados','err'); return; }
      importState.headers=rows[0].map(h=>String(h||'').trim());
      importState.rows=rows;
      importState.map={}; IMP_FIELDS.forEach(([f])=>importState.map[f]=detectCol(f,importState.headers));
      openImportMapper();
    }catch(e){ toast('Erro ao ler arquivo: '+e.message,'err'); }
  };
  if(name.endsWith('.csv')) rd.readAsText(file,'UTF-8'); else rd.readAsArrayBuffer(file);
}

  const lanc=[];
  importState.rows.slice(1).forEach(r=>{
    if(!Array.isArray(r)||!r.some(c=>String(c).trim()!==''))return;
    const desc=String(cell(r,'descricao')||'').trim();
    const valor=impNum(cell(r,'valor'));
    if(!desc && !valor)return;
    const sub=String(cell(r,'subcategoria')||'').trim();
    const cat=String(cell(r,'categoria')||'').trim();
    const forma=String(cell(r,'forma')||'').trim();
    if(sub)subsSet.add(sub); if(cat)catsSet.add(cat); if(forma)formasSet.add(forma);
    let forn=String(cell(r,'fornecedor')||'').trim(), funcId='', funcNome2='';
    if(sub.toLowerCase()==='empreita'){ funcNome2=forn||'Empreita'; funcId=getFunc(funcNome2); forn=''; }
    lanc.push({id:uid(),data:impDateISO(cell(r,'data')),fornecedor:forn,descricao:desc||'(sem descrição)',
      subcategoria:sub,categoria:cat,forma:forma,obs:String(cell(r,'obs')||'').trim(),
      valorPrevisto:valor,valorRealizado:valor,status:statusDef,autor:session.name,
      funcionarioId:funcId,funcionarioNome:funcNome2});
  });
  if(!lanc.length){err.textContent='Nenhuma linha válida encontrada com esse mapeamento.';return;}
  try{
    const upd={};
    if(subsSet.size)upd.subcategorias=firebase.firestore.FieldValue.arrayUnion(...subsSet);
    if(catsSet.size)upd.categorias=firebase.firestore.FieldValue.arrayUnion(...catsSet);
    if(formasSet.size)upd.formas=firebase.firestore.FieldValue.arrayUnion(...formasSet);
    if(Object.keys(upd).length)await db.collection('meta').doc('lists').set(upd,{merge:true});
    const lancamentos=[...(o.lancamentos||[]),...lanc];
    const funcionarios=[...(o.funcionarios||[]),...newFuncs];
    await db.collection('obras').doc(obraId).update({lancamentos,funcionarios});
    closeModal(); toast(`${lanc.length} lançamentos importados em ${o.nome}`,'ok');
  }catch(e){ err.textContent='Erro ao gravar: '+(e.code||e.message); }
}

function openEtapaModal(obraId,eid=null){
  const o=state.obras.find(x=>x.id===obraId);const e=eid?o.etapas.find(x=>x.id===eid):{};
  openModal(`<div class="modal"><div class="modal-head"><h3>${eid?'Editar etapa':'Nova etapa'}</h3>
    <button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${field('Nome da etapa','e_nome',e.nome||'','text','Ex: Fundação')}
      <div class="fgrid-2">${field('Início','e_ini',e.inicio||'','date')}${field('Fim','e_fim',e.fim||'','date')}</div>
      ${field('Progresso','e_prog',e.prog||'0','text','0','%')}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px" onclick="saveEtapa('${obraId}','${eid||''}')">Salvar</button></div></div>`);
}
async function saveEtapa(obraId,eid){const o=state.obras.find(x=>x.id===obraId);if(!o)return;const g=x=>document.getElementById(x).value;
  const nome=g('e_nome').trim();if(!nome){toast('Informe o nome','err');return;}
  const d={nome,inicio:g('e_ini'),fim:g('e_fim'),prog:Math.min(100,num(g('e_prog')))};
  const arr=(o.etapas||[]).slice();
  if(eid){const i=arr.findIndex(x=>x.id===eid);if(i>=0)arr[i]={...arr[i],...d};}else arr.push({id:uid(),...d});
  try{ await db.collection('obras').doc(obraId).update({etapas:arr}); closeModal();toast('Etapa salva','ok'); }
  catch(e){ toast('Erro ao salvar: '+e.code,'err'); }}
function delEtapa(obraId,eid){const o=state.obras.find(x=>x.id===obraId);if(!o)return;
  const arr=(o.etapas||[]).filter(x=>x.id!==eid);
  db.collection('obras').doc(obraId).update({etapas:arr}).catch(e=>toast('Erro: '+e.code,'err'));}

function openUserModal(){
  openModal(`<div class="modal"><div class="modal-head"><h3>Novo usuário</h3><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${field('Nome','u_name')}${field('E-mail','u_email','','email','nome@email.com')}${field('Senha provisória','u_pass','','password','mínimo 6 caracteres')}
    ${sel('Perfil','u_role',['Usuário','Administrador'],'Usuário')}
    <p class="hint">O perfil <b>Usuário</b> acessa obras, dimensões e cronograma, mas não vê valores financeiros. O usuário pode trocar a senha depois via "Esqueci minha senha".</p>
    <div class="auth-err" id="u_err" style="margin-top:8px"></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;padding:11px 22px" id="u_btn" onclick="saveUser()">Criar usuário</button></div></div>`);
}
async function saveUser(){
  const g=x=>document.getElementById(x).value;
  const name=g('u_name').trim(),email=g('u_email').trim(),p=g('u_pass'),role=g('u_role');
  const err=document.getElementById('u_err'); err.textContent='';
  if(!name||!email||!p){err.textContent='Preencha todos os campos.';return;}
  if(p.length<6){err.textContent='A senha precisa de ao menos 6 caracteres.';return;}
  const btn=document.getElementById('u_btn'); btn.disabled=true; btn.textContent='Criando…';
  // app secundário: cria o usuário sem deslogar o admin
  let sec;
  try{
    sec = firebase.initializeApp(firebaseConfig, 'sec-'+Date.now());
    const cred = await sec.auth().createUserWithEmailAndPassword(email,p);
    await db.collection('users').doc(cred.user.uid).set({name,email,role,ativo:true,createdAt:Date.now(),criadoPor:session.email});
    await sec.auth().signOut();
    toast('Usuário criado','ok'); closeModal();
  }catch(e){
    btn.disabled=false; btn.textContent='Criar usuário';
    err.textContent = e.code==='auth/email-already-in-use' ? 'Este e-mail já está cadastrado.'
      : e.code==='auth/invalid-email' ? 'E-mail inválido.' : 'Erro: '+e.code;
  }finally{ if(sec){ try{ await sec.delete(); }catch(_){}}}
}
function toggleUserAtivo(id,ativo){
  db.collection('users').doc(id).update({ativo}).then(()=>toast(ativo?'Usuário ativado':'Usuário desativado','ok'))
    .catch(e=>toast('Erro: '+e.code,'err'));
}
function resetUserPass(email){
  confirmModal('Enviar redefinição de senha?',`Será enviado um link para <b>${esc(email)}</b>.`,async()=>{
    try{ await auth.sendPasswordResetEmail(email); toast('Link enviado para '+email,'ok'); }
    catch(e){ toast('Erro: '+e.code,'err'); }
  });
}
function delUser(id){
  const u=state.users.find(x=>x.id===id);
  confirmModal('Remover usuário?',`O acesso de <b>${esc(u?u.name:'')}</b> será removido. (O login no Firebase Authentication deve ser excluído manualmente no console, se desejar.)`,async()=>{
    try{ await db.collection('users').doc(id).delete(); toast('Usuário removido','ok'); }
    catch(e){ toast('Erro: '+e.code,'err'); }
  });
}
